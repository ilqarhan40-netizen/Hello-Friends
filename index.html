<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Golden Master V21.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Allura&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #111b21; --wa-border: #202c33; --wa-green: #00a884; --wa-msg-out: #005c4b; --wa-msg-in: #202c33; --wa-text: #e9edef; --wa-muted: #8696a0; --hf-purple: #a29bfe; }
        
        body { background-color: #000; margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* КОНТЕЙНЕР ПРИЛОЖЕНИЯ */
        .mobile-screen { width: 100%; max-width: 420px; height: 100dvh; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* ИЗОЛЯЦИЯ ЭКРАНОВ - ТЕПЕРЬ ОНИ В ПОЛНЫЙ РОСТ */
        .page-content { 
            position: absolute; top: 60px; left: 0; bottom: 70px; width: 100%; 
            display: none !important; flex-direction: column; background: var(--wa-bg); overflow: hidden; 
        }
        .page-content.active { display: flex !important; z-index: 10; }

        /* HEADER */
        .app-header { position: absolute; top: 0; left: 0; width: 100%; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); z-index: 100; }
        .logo-circle { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--wa-green), #028266); display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; color: white; font-size: 0.8rem; }

        /* МЕНЮ */
        .header-dropdown { position: absolute; top: 65px; right: 10px; width: 230px; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 12px; display: none; flex-direction: column; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header-dropdown.active { display: flex; }
        .header-dropdown a { color: var(--wa-text); padding: 12px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; cursor: pointer; border-radius: 10px; }
        .header-dropdown a:hover { background: var(--wa-border); }

        /* ЧАТ */
        .chat-sidebar { width: 70px; border-right: 1px solid var(--wa-border); background: var(--wa-panel); overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; max-width: 85%; line-height: 1.4; position: relative; }
        .incoming .chat-bubble { background: var(--wa-msg-in); border-bottom-left-radius: 4px; }
        .outgoing .chat-bubble { background: var(--wa-msg-out); border-bottom-right-radius: 4px; align-self: flex-end; }

        /* БЕГУЩАЯ СТРОКА */
        .marquee-bar { height: 35px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); overflow: hidden; display: flex; align-items: center; flex-shrink: 0; z-index: 20; }
        .marquee-text { white-space: nowrap; animation: scroll-anim 15s linear infinite; color: var(--wa-green); font-size: 0.75rem; font-weight: bold; padding-left: 100%; }
        @keyframes scroll-anim { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        /* ВВОД СООБЩЕНИЙ */
        .input-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--wa-panel); display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid var(--wa-border); z-index: 50; }
        .pill-input { flex-grow: 1; background: var(--wa-border); border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        .pill-input input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* НАВИГАЦИЯ */
        .nav-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--wa-panel); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--wa-border); z-index: 100; padding-bottom: 5px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--wa-muted); font-size: 0.65rem; gap: 4px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--wa-green); transform: translateY(-3px); }

        /* РОМБ */
        .rh-btn { width: 46px; height: 46px; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border-radius: 12px; transform: rotate(45deg); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(162, 155, 254, 0.5); }
        .rh-btn i { transform: rotate(-45deg); color: white; font-size: 1.3rem; }

        /* ШТОРКИ */
        .app-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
        .app-modal.active { display: flex !important; }
        .app-modal-content { background: var(--wa-panel); width: 100%; max-width: 420px; border-radius: 30px 30px 0 0; padding: 25px; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-circle { position: absolute; top: 15px; right: 15px; width: 36px; height: 36px; background: var(--wa-border); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .video-frame { position: relative; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 1; border: 1px solid var(--wa-border); }
        .video-frame.main { grid-column: 1 / 3; aspect-ratio: 16/9; border: 2px solid var(--wa-green); }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <input type="file" id="import-file-input" class="hidden" accept=".json" onchange="window.importData(event)">

    <div class="mobile-screen">
        
        <header class="app-header">
            <div class="flex items-center gap-3">
                <div class="logo-circle">HF</div>
                <span class="font-bold text-white text-lg">Hello Friends</span>
            </div>
            <div class="flex gap-5 text-[#8696a0] text-2xl">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-ellipsis-vertical" onclick="window.toggleMenu(event)"></i>
            </div>

            <div id="dropdown" class="header-dropdown">
                <div class="flex justify-between items-center mb-3 border-b border-[#202c33] pb-2">
                    <span class="text-white text-xs font-bold uppercase tracking-widest">Settings</span>
                    <i class="fa-solid fa-xmark text-gray-500" onclick="window.closeMenu()"></i>
                </div>
                <a onclick="window.openProfile()"><i class="fa-solid fa-user text-[#00a884]"></i> My Profile</a>
                <a onclick="window.toggleLang()"><i class="fa-solid fa-globe text-blue-400"></i> <span id="lang-btn">Lang: EN</span></a>
                <a onclick="window.openBank()"><i class="fa-solid fa-wallet text-yellow-500"></i> Wallet</a>
                <div class="h-[1px] bg-[#202c33] my-1"></div>
                <a onclick="window.exportData()"><i class="fa-solid fa-file-export text-blue-300"></i> Export JSON</a>
                <a onclick="document.getElementById('import-file-input').click()"><i class="fa-solid fa-file-import text-green-300"></i> Import JSON</a>
                <div class="mt-4 pt-2 border-t border-[#202c33] text-center"><span class="text-[#00a884] text-[10px] font-bold tracking-widest">AUTHOR: ILGAR</span></div>
            </div>
        </header>

        <main class="flex-grow relative">
            
            <div id="screen-0" class="page-content active">
                <div class="marquee-bar">
                    <i class="fa-solid fa-closed-captioning text-[#00a884] ml-3"></i>
                    <div class="marquee-text" id="chat-marquee">AI Global Translation Active...</div>
                </div>
                <div class="flex flex-grow overflow-hidden">
                    <div class="chat-sidebar" id="sidebar"></div>
                    <div class="flex flex-col flex-grow relative bg-[#0b141a]">
                        <div class="chat-messages" id="chat-box"></div>
                        <div class="input-footer">
                            <i class="fa-regular fa-face-smile text-[#8696a0] text-2xl"></i>
                            <div class="pill-input"><input type="text" id="chat-input" placeholder="Message..."></div>
                            <button class="w-11 h-11 rounded-full bg-[#00a884] flex items-center justify-center" onclick="window.sendMsg()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-1" class="page-content">
                <div class="flex justify-center py-6 bg-[#111b21] border-b border-[#202c33]">
                    <h2 class="text-4xl text-[#a29bfe]" style="font-family: 'Allura', cursive;">Voice Room</h2>
                </div>
                <div class="flex-grow flex flex-col items-center justify-center gap-12">
                    <div class="flex items-center gap-8">
                        <img id="v-friend-img" src="https://ui-avatars.com/api/?name=Friend" class="w-24 h-24 rounded-full border-2 border-gray-600 object-cover">
                        <div class="flex gap-2"><div class="w-1.5 h-10 bg-[#00a884] animate-bounce"></div><div class="w-1.5 h-14 bg-[#00a884] animate-bounce" style="animation-delay: 0.2s"></div></div>
                        <img id="v-me-img" src="" class="w-24 h-24 rounded-full border-4 border-[#00a884] object-cover">
                    </div>
                    <div class="marquee-bar w-full"><div class="marquee-text" id="voice-marquee">System ready for voice translation...</div></div>
                </div>
                <div class="input-footer">
                    <div class="pill-input"><input type="text" id="voice-input" placeholder="Type to translate voice..."></div>
                    <button class="w-11 h-11 rounded-full bg-red-500" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                    <button class="w-11 h-11 rounded-full bg-[#00a884]" onclick="window.sendVoice()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                </div>
            </div>

            <div id="screen-2" class="page-content">
                <div class="flex justify-between items-center px-4 py-3 bg-[#111b21] border-b border-[#202c33]">
                    <span class="text-[#00a884] font-bold tracking-widest">CONFERENCE</span>
                    <span class="text-red-500 animate-pulse font-bold text-xs">● REC</span>
                </div>
                <div id="conf-grid" class="video-grid"></div>
                <div class="flex justify-center items-center gap-6 py-4 bg-[#111b21] border-t border-[#202c33]">
                    <button class="w-12 h-12 rounded-full bg-[#202c33] text-[#00a884] flex items-center justify-center text-xl" onclick="window.toggleCC()"><i class="fa-solid fa-closed-captioning"></i></button>
                    <button id="cam-btn" class="w-12 h-12 rounded-full bg-[#202c33] text-white flex items-center justify-center text-xl" onclick="window.toggleCam()"><i class="fa-solid fa-video"></i></button>
                    <button class="w-12 h-12 rounded-full bg-red-500 text-white flex items-center justify-center text-xl" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
                <div class="input-footer">
                    <div class="pill-input"><input type="text" id="conf-input" placeholder="Meet chat..."></div>
                    <button class="w-11 h-11 rounded-full bg-[#00a884]" onclick="window.sendConf()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                </div>
            </div>

            <div id="screen-3" class="page-content">
                <div class="p-5 overflow-y-auto">
                    <h2 class="text-2xl font-bold text-white mb-6">Global Talents</h2>
                    <div id="prof-list" class="grid grid-cols-2 gap-4 pb-20"></div>
                </div>
            </div>

            <div id="screen-4" class="page-content">
                <div class="flex flex-col items-center justify-center h-full gap-10">
                    <h2 class="text-3xl font-bold text-white">Social Hub</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <a href="https://facebook.com" target="_blank" class="bg-[#202c33] p-10 rounded-[40px] flex flex-col items-center shadow-2xl transition hover:scale-105"><i class="fa-brands fa-facebook text-6xl text-blue-500"></i></a>
                        <a href="https://instagram.com" target="_blank" class="bg-[#202c33] p-10 rounded-[40px] flex flex-col items-center shadow-2xl transition hover:scale-105"><i class="fa-brands fa-instagram text-6xl text-pink-500"></i></a>
                    </div>
                </div>
            </div>
        </main>

        <nav class="nav-footer">
            <div class="nav-item active" onclick="window.switchTab(0)"><i class="fa-solid fa-message text-2xl"></i><span data-i18n="chat">Chat</span></div>
            <div class="nav-item" onclick="window.switchTab(1)"><i class="fa-solid fa-microphone-lines text-2xl"></i><span data-i18n="voice">Voice</span></div>
            <div class="nav-item" onclick="window.switchTab(2)"><i class="fa-solid fa-video text-2xl"></i><span data-i18n="meet">Meet</span></div>
            <div class="nav-item" onclick="window.switchTab(3)"><i class="fa-solid fa-briefcase text-2xl"></i><span data-i18n="cv">CV</span></div>
            <div class="nav-item" onclick="window.switchTab(4)"><i class="fa-solid fa-hashtag text-2xl"></i><span data-i18n="social">Social</span></div>
            <div class="rhombus-wrapper">
                <div class="rh-btn" onclick="window.toggleRhombus()"><i class="fa-solid fa-plus"></i></div>
                <div id="rh-menu" class="rhombus-menu">
                    <div class="action-icon" onclick="window.openGPS()"><i class="fa-solid fa-location-dot"></i></div>
                    <div class="action-icon text-red-500" onclick="window.clearHistory()"><i class="fa-solid fa-trash"></i></div>
                </div>
            </div>
        </nav>
    </div>

    <div id="modal-p" class="app-modal">
        <div class="app-modal-content">
            <div class="close-circle" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <h2 class="text-xl font-bold text-white text-center mb-6">Edit Profile</h2>
            <div class="flex justify-center mb-6"><div class="relative"><img id="p-preview" src="" class="w-20 h-20 rounded-full border-2 border-[#00a884] object-cover"><button onclick="document.getElementById('p-file').click()" class="absolute bottom-0 right-0 bg-[#00a884] w-7 h-7 rounded-full flex items-center justify-center text-black border-2 border-black"><i class="fa-solid fa-camera text-[10px]"></i></button></div></div>
            <input type="file" id="p-file" class="hidden" onchange="window.preview(event)">
            <label class="text-[#00a884] text-[10px] font-bold uppercase ml-2">Full Name</label><input type="text" id="p-name-in" class="form-input-box">
            <label class="text-[#00a884] text-[10px] font-bold uppercase ml-2">Country</label>
            <select id="p-country-in" class="form-input-box" onchange="window.applyPrefix(this)">
                <option value="un">Global</option><option value="az">Azerbaijan</option><option value="ru">Russia</option><option value="us">USA</option>
            </select>
            <label class="text-[#00a884] text-[10px] font-bold uppercase ml-2">Phone Number</label><input type="tel" id="p-phone-in" class="form-input-box">
            <button onclick="window.saveProfile()" class="btn-primary mt-4">SAVE & START</button>
        </div>
    </div>

    <div id="modal-cv" class="app-modal">
        <div class="app-modal-content">
            <div class="close-circle" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="cv-data" class="text-white text-center"></div>
            <div class="flex gap-3 mt-8">
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl" onclick="window.switchTab(0); window.closeModals()"><i class="fa-solid fa-comment text-[#00a884] text-xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl"><i class="fa-solid fa-phone text-blue-400 text-xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl"><i class="fa-solid fa-envelope text-red-400 text-xl"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-map" class="app-modal">
        <div class="app-modal-content h-[75vh]">
            <div class="close-circle" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="map-box" class="w-full h-full rounded-2xl bg-black overflow-hidden flex items-center justify-center text-gray-500">Wait for GPS...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40", authDomain: "hello-friends-p8p3i7.firebaseapp.com", databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "hello-friends-p8p3i7" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.myId = localStorage.getItem('hf_uid') || 'uid_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hf_uid', window.myId);
        window.myProfile = JSON.parse(localStorage.getItem('hf_prof')) || { name: 'Guest', flag: '🌐', lang: 'en', photo: 'https://ui-avatars.com/api/?name=G&background=random' };
        window.users = [];

        // NAVIGATION LOGIC
        window.switchTab = (idx) => {
            document.querySelectorAll('.page-content').forEach((p, i) => {
                p.classList.toggle('active', i === idx);
            });
            document.querySelectorAll('.nav-item').forEach((n, i) => {
                n.classList.toggle('active', i === idx);
            });
            if(idx === 2) window.initMeet();
            window.closeMenu();
        };

        // MULTIPLAYER SYNC
        window.sendMsg = () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            db.ref("global_v21").push({
                text: input.value, 
                sender: window.myProfile.name,
                uid: window.myId,
                flag: window.myProfile.flag,
                lang: window.myProfile.lang,
                photo: window.myProfile.photo,
                time: Date.now()
            });
            input.value = '';
        };

        db.ref("global_v21").on("child_added", async (snap) => {
            const data = snap.val();
            const isMe = data.uid === window.myId;
            
            if(!isMe && !window.users.find(u => u.uid === data.uid)) {
                window.users.push(data);
                window.renderSidebar();
            }

            const box = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = `flex gap-2 w-full mt-2 ${isMe ? 'justify-end' : 'justify-start'} ${isMe ? 'outgoing' : 'incoming'}`;
            row.innerHTML = `
                ${!isMe ? `<img src="${data.photo}" class="w-9 h-9 rounded-full self-end object-cover border border-[#202c33]" onclick="window.openCV('${data.uid}')">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe ? `<div class="text-[10px] font-bold text-green-400 ml-1">${data.sender}</div>` : ''}
                    <div class="chat-bubble ${isMe ? 'bg-[#005c4b]' : 'bg-[#202c33]'}">${data.text}</div>
                </div>
            `;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;

            if(!isMe) {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${window.myProfile.lang}&dt=t&q=${encodeURIComponent(data.text)}`).then(r => r.json());
                const translated = res[0][0][0];
                const tDiv = document.createElement('div');
                tDiv.className = `flex w-full mt-1 ${isMe ? 'justify-end pr-2' : 'justify-start pl-10'}`;
                tDiv.innerHTML = `<div class="text-yellow-400 text-[11px] font-bold opacity-90">${data.flag} ${translated}</div>`;
                box.appendChild(tDiv);
                box.scrollTop = box.scrollHeight;
                
                const marq = document.getElementById('chat-marquee');
                marq.innerHTML = `${data.sender}: ${translated} • `;
                marq.style.animation = 'none'; void marq.offsetWidth; marq.style.animation = null;
            }
        });

        window.renderSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = `<div class="w-12 h-12 rounded-full bg-green-900 flex items-center justify-center text-white border-2 border-green-400">🌍</div>`;
            window.users.forEach(u => {
                sidebar.innerHTML += `<div class="relative" onclick="window.openCV('${u.uid}')"><img src="${u.uid === window.myId ? window.myProfile.photo : u.photo}" class="w-12 h-12 rounded-full object-cover border border-[#202c33]"><span class="absolute -bottom-1 -right-1 text-[10px] bg-black px-1 rounded-full border border-white/20">${u.flag}</span></div>`;
            });
        };

        window.openCV = (uid) => {
            const u = window.users.find(x => x.uid === uid) || (uid === window.myId ? window.myProfile : null);
            if(!u) return;
            document.getElementById('cv-data').innerHTML = `<img src="${u.photo}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-[#00a884]"><h3 class="text-2xl font-bold">${u.sender || u.name}</h3><p class="text-gray-400">Language: ${u.lang.toUpperCase()}</p><p class="text-[#00a884] font-bold mt-2">● Online</p>`;
            document.getElementById('modal-cv').classList.add('active');
        };

        // GPS HTTPS FIX
        window.openGPS = () => {
            document.getElementById('modal-map').classList.add('active');
            const box = document.getElementById('map-box');
            navigator.geolocation.getCurrentPosition(pos => {
                box.innerHTML = `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}&z=15&output=embed" style="border:none;"></iframe>`;
            }, () => { box.innerText = "GPS Access Denied"; });
        };

        window.saveProfile = () => {
            const name = document.getElementById('p-name-in').value || 'User';
            const country = document.getElementById('p-country-in').value;
            const flags = { az: '🇦🇿', ru: '🇷🇺', us: '🇺🇸', un: '🌐' };
            const langs = { az: 'az', ru: 'ru', us: 'en', un: 'en' };
            window.myProfile = { name: name, flag: flags[country], lang: langs[country], photo: window.tempImg || `https://ui-avatars.com/api/?name=${name}&background=random` };
            localStorage.setItem('hf_prof', JSON.stringify(window.myProfile));
            window.closeModals();
            location.reload();
        };

        window.applyPrefix = (s) => {
            const codes = { az: '+994 ', ru: '+7 ', us: '+1 ', un: '+ ' };
            document.getElementById('p-phone-in').value = codes[s.value];
        };

        window.preview = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { window.tempImg = ev.target.result; document.getElementById('p-preview').src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'hf_backup.json'; a.click();
        };
        window.importData = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                for (let k in data) localStorage.setItem(k, data[k]);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        };

        window.toggleMenu = (e) => { e.stopPropagation(); document.getElementById('dropdown').classList.toggle('active'); };
        window.closeMenu = () => document.getElementById('dropdown').classList.remove('active');
        window.toggleRhombus = () => document.getElementById('rh-menu').classList.toggle('active');
        window.closeModals = () => document.querySelectorAll('.app-modal').forEach(m => m.classList.remove('active'));
        window.openProfile = () => { document.getElementById('modal-p').classList.add('active'); window.closeMenu(); };
        
        document.body.addEventListener('click', () => { window.closeMenu(); document.getElementById('rh-menu').classList.remove('active'); });
        
        // STARTUP
        if(!localStorage.getItem('hf_prof')) window.openProfile();
        document.getElementById('v-me-img').src = window.myProfile.photo;
        document.getElementById('p-preview').src = window.myProfile.photo;
        document.getElementById('p-name-in').value = window.myProfile.name;
    </script>
</body>
</html>
