<div id="edit-profile-modal" class="app-modal" onclick="if(event.target===this) this.classList.remove('active');">
            <div class="app-modal-content w-full max-w-[300px] max-h-[80vh] overflow-y-auto p-4" onclick="event.stopPropagation();">
                <i class="fa-solid fa-xmark close-modal-btn absolute top-3 right-4 text-lg" onclick="document.getElementById('edit-profile-modal').classList.remove('active')"></i>
                
                <h2 class="text-lg font-bold text-white mb-3 text-center border-b border-[#4a4e53] pb-2 w-full">
                    <i class="fa-solid fa-user-pen text-[#a29bfe] mr-2"></i> Edit Profile
                </h2>

                <div class="flex flex-col items-center mb-3 w-full">
                    <div class="relative w-20 h-20 mb-1">
                        <img id="edit-preview-photo" src="https://ui-avatars.com/api/?name=User" class="w-full h-full rounded-full object-cover border-2 border-[#a29bfe] shadow-md">
                        <button onclick="document.getElementById('photo-upload-input').click()" class="absolute bottom-0 right-0 bg-[#a29bfe] text-white rounded-full w-7 h-7 flex items-center justify-center border border-[#2a2d32] hover:scale-110 transition cursor-pointer" title="Upload Photo">
                            <i class="fa-solid fa-camera text-xs"></i>
                        </button>
                    </div>
                    <input type="file" id="photo-upload-input" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                </div>

                <label class="form-label mt-0 mb-1 text-[0.65rem]">Name</label>
                <input type="text" id="edit-name" class="form-input py-1.5 px-3 text-sm mb-2" placeholder="Your Name">

                <label class="form-label mt-0 mb-1 text-[0.65rem]">Country</label>
                <div class="flex items-center gap-2 w-full mb-2">
                    <img id="edit-flag-icon" src="https://flagcdn.com/w40/un.png" class="w-8 h-5 rounded-sm border border-[#4a4e53] object-cover shadow-sm shrink-0">
                    <select id="edit-country-select" class="form-input py-1.5 px-2 text-sm w-full mt-0" onchange="updateFlagIcon(this)">
                        <option value="un" data-name="Global" data-emoji="🌐">Global / Default</option>
                        <option value="az" data-name="Azerbaijan" data-emoji="🇦🇿">Azerbaijan</option>
                        <option value="ru" data-name="Russia" data-emoji="🇷🇺">Russia</option>
                        <option value="gb" data-name="United Kingdom" data-emoji="🇬🇧">United Kingdom</option>
                        <option value="us" data-name="United States" data-emoji="🇺🇸">United States</option>
                        <option value="de" data-name="Germany" data-emoji="🇩🇪">Germany</option>
                        <option value="it" data-name="Italy" data-emoji="🇮🇹">Italy</option>
                        <option value="tr" data-name="Turkey" data-emoji="🇹🇷">Turkey</option>
                        <option value="fr" data-name="France" data-emoji="🇫🇷">France</option>
                        <option value="es" data-name="Spain" data-emoji="🇪🇸">Spain</option>
                        <option value="cn" data-name="China" data-emoji="🇨🇳">China</option>
                        <option value="ae" data-name="UAE" data-emoji="🇦🇪">United Arab Emirates</option>
                    </select>
                </div>

                <div class="flex gap-2 w-full mb-2">
                    <div class="w-1/2">
                        <label class="form-label mt-0 mb-1 text-[0.65rem]">Phone</label>
                        <input type="tel" id="edit-phone" class="form-input py-1.5 px-2 text-sm mt-0" placeholder="+994...">
                    </div>
                    <div class="w-1/2">
                        <label class="form-label mt-0 mb-1 text-[0.65rem]">Email</label>
                        <input type="email" id="edit-email" class="form-input py-1.5 px-2 text-sm mt-0" placeholder="mail@...">
                    </div>
                </div>

                <label class="form-label mt-0 mb-1 text-[0.65rem]">Profession / Role</label>
                <input type="text" id="edit-prof" class="form-input py-1.5 px-3 text-sm mb-2 mt-0" placeholder="e.g. CEO / Investor">

                <label class="form-label mt-0 mb-1 text-[0.65rem]">Languages</label>
                <input type="text" id="edit-langs" class="form-input py-1.5 px-3 text-sm mb-2 mt-0" placeholder="e.g. English, Russian">

                <label class="form-label mt-0 mb-1 text-[0.65rem]">About / CV</label>
                <textarea id="edit-desc" class="form-input resize-none w-full py-1.5 px-3 text-sm mt-0" rows="2" placeholder="Tell about your skills..."></textarea>

                <button onclick="saveProfileData()" class="form-btn mt-3 mb-3 py-2.5 text-sm w-full"><i class="fa-solid fa-floppy-disk mr-2"></i> Save Profile</button>

                <div class="flex gap-2 w-full border-t border-[#4a4e53] pt-3">
                    <button onclick="document.getElementById('edit-profile-modal').classList.remove('active'); window.switchTab(0); window.switchChatRoom('me');" class="w-full py-2 rounded-lg border-none text-white font-bold cursor-pointer transition-transform active:scale-95 flex-1 bg-gradient-to-r from-blue-600 to-blue-500 flex justify-center items-center gap-1 text-xs shadow-sm">
                        <i class="fa-solid fa-comment"></i> Chat
                    </button>
                    <button onclick="alert('You cannot send SMS to yourself.');" class="w-full py-2 rounded-lg border-none text-white font-bold cursor-pointer transition-transform active:scale-95 flex-1 bg-gradient-to-r from-green-600 to-green-500 flex justify-center items-center gap-1 text-xs shadow-sm opacity-80">
                        <i class="fa-solid fa-comment-sms"></i> SMS
                    </button>
                    <button onclick="alert('You cannot email yourself from here.');" class="w-full py-2 rounded-lg border-none text-white font-bold cursor-pointer transition-transform active:scale-95 flex-1 bg-gradient-to-r from-purple-600 to-purple-500 flex justify-center items-center gap-1 text-xs shadow-sm opacity-80">
                        <i class="fa-solid fa-envelope"></i> Email
                    </button>
                </div>
            </div>
        </div>
