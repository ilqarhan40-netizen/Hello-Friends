<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Test</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; background: #0b141a; color: white; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        /* КОНТЕЙНЕР ДЛЯ ЭКРАНОВ */
        .screens-container { flex-grow: 1; position: relative; overflow: hidden; }
        
        /* САМИ ЭКРАНЫ */
        .screen { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: 2rem; }
        .screen.active { display: flex; }

        /* НАВИГАЦИЯ ВНИЗУ */
        .bottom-nav { height: 70px; background: #111b21; display: flex; border-top: 1px solid #202c33; flex-shrink: 0; }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; color: #8696a0; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: #00a884; }
    </style>
</head>
<body>

    <div class="screens-container">
        <div id="screen-0" class="screen active" style="background: #1e1e1e;">Экран 1: ЧАТ</div>
        <div id="screen-1" class="screen" style="background: #2d3436;">Экран 2: ГОЛОС</div>
        <div id="screen-2" class="screen" style="background: #2d2a32;">Экран 3: ЗВОНОК</div>
        <div id="screen-3" class="screen" style="background: #1a252c;">Экран 4: ПРОФИЛИ</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="switchTab(0)">1. Чат</div>
        <div class="nav-btn" onclick="switchTab(1)">2. Голос</div>
        <div class="nav-btn" onclick="switchTab(2)">3. Звонок</div>
        <div class="nav-btn" onclick="switchTab(3)">4. CV</div>
    </div>

    <script>
        function switchTab(index) {
            // Скрываем все экраны и отключаем кнопки
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Включаем нужный экран и кнопку
            document.getElementById('screen-' + index).classList.add('active');
            document.querySelectorAll('.nav-btn')[index].classList.add('active');
        }
    </script>

</body>
</html>
