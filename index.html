<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Friends - Отправка Email</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📩 Написать письмо</h2>
    <input type="email" id="emailTo" placeholder="Кому (email)" required>
    <input type="text" id="subject" placeholder="Тема письма" required>
    <textarea id="message" rows="4" placeholder="Ваше сообщение..." required></textarea>
    <button onclick="sendData()">Отправить письмо</button>
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        const statusDiv = document.getElementById('status');
        const btn = document.querySelector('button');
        
        const payload = {
            to: document.getElementById('emailTo').value,
            subject: document.getElementById('subject').value,
            text: document.getElementById('message').value
        };

        if (!payload.to || !payload.subject || !payload.text) {
            statusDiv.style.color = "orange";
            statusDiv.innerText = "⚠️ Заполните все поля!";
            return;
        }

        statusDiv.style.color = "blue";
        statusDiv.innerText = "⏳ Отправка...";
        btn.disabled = true;

        try {
            // МЫ ИСПОЛЬЗУЕМ ОТНОСИТЕЛЬНЫЙ ПУТЬ (БЕЗ 8080!), ЧТОБЫ РАБОТАЛО В ОБЛАКЕ
            const response = await fetch('/api/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success) {
                statusDiv.style.color = "green";
                statusDiv.innerText = "✅ ПИСЬМО ОТПРАВЛЕНО!";
            } else {
                statusDiv.style.color = "red";
                statusDiv.innerText = "❌ ОШИБКА: " + (result.error || "Неизвестно");
            }
        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Ошибка связи с сервером!";
            console.error('Error:', error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
