<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Stable Base</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ТОЛЬКО ЦВЕТА И БАЗА. НИКАКИХ СЛОЖНЫХ ПРАВИЛ СЛОЕВ */
        :root { --wa-bg: #0b141a; --wa-panel: #111b21; --wa-border: #202c33; --wa-green: #00a884; }
        
        body { background-color: #000; margin: 0; padding: 0; height: 100dvh; display: flex; justify-content: center; overflow: hidden; font-family: sans-serif; }
        
        /* ЖЕСТКИЙ КАРКАС ПРИЛОЖЕНИЯ */
        .app-wrapper { width: 100%; max-width: 450px; height: 100%; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; }
        
        /* ЧАТ ЭЛЕМЕНТЫ */
        .chat-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; max-width: 85%; color: white; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .input-pill { flex-grow: 1; background: var(--wa-border); border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        .input-pill input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; }
        
        /* БЕГУЩАЯ СТРОКА */
        .marquee-container { height: 35px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); overflow: hidden; display: flex; align-items: center; }
        .marquee-text { white-space: nowrap; animation: scroll 12s linear infinite; color: var(--wa-green); font-size: 0.75rem; font-weight: bold; padding-left: 100%; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        /* МОДАЛКИ И ШТОРКИ */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--wa-panel); width: 100%; max-width: 450px; border-radius: 25px 25px 0 0; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; color: white; }
        .close-btn { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: var(--wa-border); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; }
        .form-input { w-full; width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--wa-border); background: var(--wa-bg); color: white; margin-bottom: 12px; outline: none; }

        /* НАВИГАЦИЯ */
        .nav-item { color: #8696a0; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--wa-green); }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <header class="h-[60px] bg-[#111b21] border-b border-[#202c33] flex justify-between items-center px-4 shrink-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-[34px] h-[34px] rounded-full bg-[#00a884] flex justify-center items-center font-bold text-black text-sm">HF</div>
                <span class="text-white font-bold text-lg">Hello Friends</span>
            </div>
            <div class="text-[#8696a0] text-2xl cursor-pointer" id="menu-trigger" onclick="window.toggleMenu(event)">
                <i class="fa-solid fa-ellipsis-vertical pointer-events-none"></i>
            </div>

            <div id="main-menu" class="hidden absolute top-[65px] right-[10px] w-[220px] bg-[#111b21] border border-[#202c33] rounded-xl p-2 flex-col gap-1 shadow-2xl z-[500]">
                <div class="flex justify-between items-center mb-2 border-b border-[#202c33] pb-2 px-2">
                    <span class="text-white text-xs font-bold uppercase">Settings</span>
                    <i class="fa-solid fa-xmark text-gray-500 cursor-pointer" onclick="window.hideMenu()"></i>
                </div>
                <button onclick="window.openProfile()" class="flex items-center gap-3 text-white p-3 rounded-lg hover:bg-[#202c33] text-left"><i class="fa-solid fa-user text-[#00a884]"></i> My Profile</button>
                <button class="flex items-center gap-3 text-white p-3 rounded-lg hover:bg-[#202c33] text-left"><i class="fa-solid fa-globe text-blue-400"></i> Language</button>
                <button onclick="window.exportData()" class="flex items-center gap-3 text-white p-3 rounded-lg hover:bg-[#202c33] text-left"><i class="fa-solid fa-file-export text-blue-300"></i> Export JSON</button>
            </div>
        </header>

        <main class="flex-grow overflow-hidden relative bg-[#0b141a]">
            
            <div id="screen-0" class="app-screen flex flex-col w-full h-full">
                <div class="marquee-container shrink-0">
                    <i class="fa-solid fa-closed-captioning text-[#00a884] ml-3"></i>
                    <div class="marquee-text" id="chat-marquee">AI Global Translation Active...</div>
                </div>
                <div class="flex flex-grow overflow-hidden">
                    <div id="sidebar" class="w-[70px] bg-[#111b21] border-r border-[#202c33] flex flex-col items-center py-3 gap-4 overflow-y-auto"></div>
                    <div class="flex flex-col flex-grow relative">
                        <div id="chat-box" class="flex-grow overflow-y-auto p-4 flex flex-col gap-2"></div>
                        <div class="h-[65px] bg-[#111b21] border-t border-[#202c33] flex items-center px-3 gap-2 shrink-0">
                            <i class="fa-regular fa-face-smile text-[#8696a0] text-2xl"></i>
                            <div class="input-pill"><input type="text" id="chat-input" placeholder="Message..."></div>
                            <button class="w-[42px] h-[42px] rounded-full bg-[#00a884] flex items-center justify-center shrink-0" onclick="window.sendMsg()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-1" class="app-screen hidden flex-col w-full h-full">
                <div class="flex justify-center py-6 bg-[#111b21] border-b border-[#202c33] shrink-0">
                    <h2 class="text-4xl text-[#a29bfe]" style="font-family: 'Allura', cursive;">Voice Room</h2>
                </div>
                <div class="flex-grow flex flex-col items-center justify-center gap-10">
                    <div class="flex items-center gap-8">
                        <img id="v-friend-img" src="https://ui-avatars.com/api/?name=Friend" class="w-24 h-24 rounded-full border-2 border-gray-600 object-cover">
                        <div class="flex gap-2"><div class="w-1.5 h-10 bg-[#00a884] animate-bounce"></div><div class="w-1.5 h-14 bg-[#00a884] animate-bounce" style="animation-delay: 0.2s"></div></div>
                        <img id="v-me-img" src="" class="w-24 h-24 rounded-full border-4 border-[#00a884] object-cover">
                    </div>
                    <div class="marquee-container w-full"><div class="marquee-text" id="voice-marquee">Speak to translate...</div></div>
                </div>
                <div class="h-[65px] bg-[#111b21] border-t border-[#202c33] flex items-center px-3 gap-2 shrink-0">
                    <div class="input-pill"><input type="text" id="voice-input" placeholder="Voice text..."></div>
                    <button class="w-[42px] h-[42px] rounded-full bg-[#202c33] border border-[#2a3942] text-[#8696a0] flex items-center justify-center shrink-0" onclick="alert('Mic On')"><i class="fa-solid fa-microphone"></i></button>
                    <button class="w-[42px] h-[42px] rounded-full bg-[#00a884] flex items-center justify-center shrink-0" onclick="window.sendVoice()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                    <button class="w-[42px] h-[42px] rounded-full bg-red-500 flex items-center justify-center shrink-0" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash text-white"></i></button>
                </div>
            </div>

            <div id="screen-2" class="app-screen hidden flex-col w-full h-full bg-[#000]">
                <div class="flex justify-between items-center px-4 py-3 bg-[#111b21] border-b border-[#202c33] shrink-0">
                    <span class="text-[#00a884] font-bold text-xs uppercase">Conference</span>
                    <span class="text-red-500 font-bold text-xs animate-pulse">● REC</span>
                </div>
                <div id="conf-grid" class="flex-grow p-2 grid grid-cols-2 gap-2 overflow-y-auto"></div>
                <div class="h-[75px] bg-[#111b21] flex justify-center items-center gap-6 shrink-0">
                    <button class="w-[45px] h-[45px] rounded-full bg-[#202c33] text-[#00a884] flex items-center justify-center text-xl"><i class="fa-solid fa-closed-captioning"></i></button>
                    <button class="w-[45px] h-[45px] rounded-full bg-[#202c33] text-white flex items-center justify-center text-xl"><i class="fa-solid fa-video"></i></button>
                    <button class="w-[45px] h-[45px] rounded-full bg-red-500 text-white flex items-center justify-center text-xl" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

            <div id="screen-3" class="app-screen hidden flex-col w-full h-full p-4 overflow-y-auto">
                <h2 class="text-2xl font-bold text-white mb-6">Global Talents</h2>
                <div id="prof-list" class="grid grid-cols-2 gap-4 pb-10"></div>
            </div>
            
        </main>

        <nav class="h-[70px] bg-[#111b21] border-t border-[#202c33] flex justify-around items-center px-2 shrink-0 z-50">
            <div class="nav-item active" onclick="window.switchTab(0)"><i class="fa-solid fa-message text-2xl"></i></div>
            <div class="nav-item" onclick="window.switchTab(1)"><i class="fa-solid fa-microphone-lines text-2xl"></i></div>
            <div class="nav-item" onclick="window.switchTab(2)"><i class="fa-solid fa-video text-2xl"></i></div>
            <div class="nav-item" onclick="window.switchTab(3)"><i class="fa-solid fa-briefcase text-2xl"></i></div>
            <div class="w-[45px] h-[45px] bg-[#a29bfe] rounded-xl flex justify-center items-center rotate-45 cursor-pointer shadow-lg" onclick="window.openLocation()">
                <i class="fa-solid fa-location-dot text-white -rotate-45 text-xl"></i>
            </div>
        </nav>
    </div>

    <div id="modal-identity" class="modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <h2 class="text-xl font-bold text-center mb-6 uppercase tracking-widest">My Profile</h2>
            <div class="flex justify-center mb-6">
                <img id="p-img" src="" class="w-24 h-24 rounded-full border-2 border-[#00a884] object-cover">
            </div>
            <input type="text" id="p-name" class="form-input" placeholder="Full Name">
            <select id="p-country" class="form-input">
                <option value="un" data-flag="🌐" data-lang="en">Global</option>
                <option value="az" data-flag="🇦🇿" data-lang="az">Azerbaijan</option>
                <option value="ru" data-flag="🇷🇺" data-lang="ru">Russia</option>
                <option value="us" data-flag="🇺🇸" data-lang="en">USA</option>
            </select>
            <button onclick="window.saveProfile()" class="w-full p-4 bg-[#00a884] text-black font-bold rounded-xl mt-2">SAVE</button>
        </div>
    </div>

    <div id="modal-map" class="modal-overlay">
        <div class="modal-content h-[70vh] flex flex-col" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <h2 class="text-xl font-bold mb-4 text-white"><i class="fa-solid fa-location-dot text-red-500 mr-2"></i> Location</h2>
            <div id="map-target" class="w-full flex-grow bg-black rounded-xl flex items-center justify-center text-gray-500">Wait for GPS...</div>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40", authDomain: "hello-friends-p8p3i7.firebaseapp.com", databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "hello-friends-p8p3i7" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.myUid = localStorage.getItem('hf_25_uid') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hf_25_uid', window.myUid);
        window.myProf = JSON.parse(localStorage.getItem('hf_25_prof')) || { name: 'Guest', flag: '🌐', lang: 'en', photo: 'https://ui-avatars.com/api/?name=Guest&background=random' };
        window.users = [];

        // ==========================================
        // ФУНДАМЕНТАЛЬНОЕ ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ 
        // ==========================================
        window.switchTab = (idx) => {
            const screens = document.querySelectorAll('.app-screen');
            const navs = document.querySelectorAll('.nav-item');
            
            screens.forEach((screen, i) => {
                if(i === idx) {
                    screen.classList.remove('hidden');
                    screen.classList.add('flex'); // Показываем
                } else {
                    screen.classList.remove('flex');
                    screen.classList.add('hidden'); // УБИВАЕМ из верстки
                }
            });
            
            navs.forEach((nav, i) => nav.classList.toggle('active', i === idx));
            window.hideMenu();
        };

        // ЧАТ (ПЕРЕДАЧА ДАННЫХ АМЕРИКАНЦА ВБИТА СЮДА)
        window.sendMsg = () => {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            db.ref("global_room_25").push({ text: inp.value, name: window.myProf.name, uid: window.myUid, flag: window.myProf.flag, lang: window.myProf.lang, photo: window.myProf.photo });
            inp.value = '';
        };

        db.ref("global_room_25").on("child_added", async (snap) => {
            const d = snap.val(); const isMe = d.uid === window.myUid;
            
            if(!isMe && !window.users.find(u => u.uid === d.uid)) {
                window.users.push(d); window.drawSidebar();
            }

            const box = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = `flex gap-2 w-full ${isMe ? 'justify-end' : 'justify-start'}`;
            row.innerHTML = `
                ${!isMe ? `<img src="${d.photo}" class="w-8 h-8 rounded-full self-end object-cover border border-[#202c33]">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe ? `<div class="text-[10px] font-bold text-[#00a884] ml-1 mb-1">${d.name}</div>` : ''}
                    <div class="chat-bubble ${isMe ? 'bg-[#005c4b]' : 'bg-[#202c33]'}">${d.text}</div>
                </div>
            `;
            box.appendChild(row);

            if(!isMe) {
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${window.myProf.lang}&dt=t&q=${encodeURIComponent(d.text)}`).then(r => r.json());
                    const trans = res[0][0][0];
                    const tDiv = document.createElement('div');
                    tDiv.className = `flex w-full mt-1 ${isMe ? 'justify-end' : 'justify-start pl-10'}`;
                    tDiv.innerHTML = `<div class="text-yellow-400 text-[11px] font-bold">${d.flag} ${trans}</div>`;
                    box.appendChild(tDiv);
                    document.getElementById('chat-marquee').innerHTML = `${d.name}: ${trans}`;
                } catch(e){}
            }
            box.scrollTop = box.scrollHeight;
        });

        window.drawSidebar = () => {
            const side = document.getElementById('sidebar');
            side.innerHTML = '<div class="w-11 h-11 rounded-full bg-[#005c4b] flex items-center justify-center text-white border border-[#202c33]">🌍</div>';
            window.users.forEach(u => {
                side.innerHTML += `<div class="relative"><img src="${u.photo}" class="w-11 h-11 rounded-full object-cover border border-[#202c33]"><span class="absolute -bottom-1 -right-1 text-[10px] bg-black px-1 rounded-full">${u.flag}</span></div>`;
            });
        };

        // ==========================================
        // ЗАКРЫТИЕ МЕНЮ ПО ЛЮБОМУ КЛИКУ ЭКРАНА
        // ==========================================
        window.toggleMenu = (e) => { 
            e.stopPropagation(); 
            const menu = document.getElementById('main-menu');
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden'); menu.classList.add('flex');
            } else {
                menu.classList.remove('flex'); menu.classList.add('hidden');
            }
        };
        window.hideMenu = () => { 
            const menu = document.getElementById('main-menu');
            if(menu) { menu.classList.remove('flex'); menu.classList.add('hidden'); }
        };
        
        // Слушаем клик на всем документе (телефоне)
        document.addEventListener('click', (e) => { 
            // Если кликнули не по кнопке вызова меню - закрываем его
            if(!e.target.closest('#menu-trigger')) {
                window.hideMenu();
            }
        });

        // МОДАЛКИ ПРОФИЛЯ
        window.closeModals = () => {
            document.getElementById('modal-identity').style.display = 'none';
            document.getElementById('modal-map').style.display = 'none';
        };
        window.openProfile = () => { document.getElementById('modal-identity').style.display = 'flex'; window.hideMenu(); };
        window.openLocation = () => { 
            document.getElementById('modal-map').style.display = 'flex'; 
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('map-target').innerHTML = `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}&z=15&output=embed" style="border:none;"></iframe>`;
            });
        };

        window.saveProfile = () => {
            const name = document.getElementById('p-name').value || 'User';
            const c = document.getElementById('p-country');
            const opt = c.options[c.selectedIndex];
            window.myProf = { name: name, flag: opt.getAttribute('data-flag'), lang: opt.getAttribute('data-lang'), photo: `https://ui-avatars.com/api/?name=${name}&background=random` };
            localStorage.setItem('hf_25_prof', JSON.stringify(window.myProf));
            window.closeModals(); location.reload();
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
        };

        // СТАРТ
        if(!localStorage.getItem('hf_25_prof')) window.openProfile();
        document.getElementById('v-me-img').src = window.myProf.photo;
        document.getElementById('p-img').src = window.myProf.photo;
        document.getElementById('p-name').value = window.myProf.name;
    </script>
</body>
</html>
