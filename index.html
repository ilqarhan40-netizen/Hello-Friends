<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Golden Master V22.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Allura&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #111b21; --wa-border: #202c33; --wa-green: #00a884; --wa-msg-out: #005c4b; --wa-msg-in: #202c33; --wa-text: #e9edef; --hf-purple: #a29bfe; }
        
        body { background-color: #000; margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
        
        .mobile-screen { width: 100%; max-width: 450px; height: 100dvh; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* ЖЕСТКИЙ ФИКС НАЛОЖЕНИЯ ЭКРАНОВ */
        .screen-container { flex-grow: 1; position: relative; width: 100%; overflow: hidden; }
        .page-content { 
            position: absolute; inset: 0; 
            display: none !important; flex-direction: column; 
            background: var(--wa-bg); z-index: 1; 
        }
        .page-content.active { display: flex !important; z-index: 10; }

        /* HEADER & FOOTER FIXED */
        .app-header { height: 60px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; shrink-0; z-index: 100; }
        .nav-footer { height: 70px; background: var(--wa-panel); border-top: 1px solid var(--wa-border); display: flex; justify-content: space-around; align-items: center; shrink-0; z-index: 100; padding-bottom: 5px; }

        /* ЭЛЕМЕНТЫ ЧАТА */
        .chat-sidebar { width: 70px; border-right: 1px solid var(--wa-border); background: var(--wa-panel); overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; background: #0b141a; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; max-width: 85%; color: white; line-height: 1.4; }
        
        .input-area { height: 65px; background: var(--wa-panel); display: flex; align-items: center; padding: 0 10px; gap: 8px; border-top: 1px solid var(--wa-border); }
        .pill-input { flex-grow: 1; background: var(--wa-border); border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        .pill-input input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* БЕГУЩАЯ СТРОКА */
        .marquee-bar { height: 35px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); overflow: hidden; display: flex; align-items: center; }
        .marquee-text { white-space: nowrap; animation: scroll-wa 15s linear infinite; color: var(--wa-green); font-size: 0.75rem; font-weight: bold; padding-left: 100%; }
        @keyframes scroll-wa { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        /* МЕНЮ И МОДАЛКИ */
        .dropdown-menu { position: absolute; top: 65px; right: 10px; width: 220px; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 15px; padding: 10px; display: none; flex-direction: column; z-index: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu a { color: var(--wa-text); padding: 10px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; cursor: pointer; border-radius: 8px; }
        
        .app-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: flex-end; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .app-modal.active { display: flex !important; }
        .modal-content { background: var(--wa-panel); width: 100%; max-width: 450px; border-radius: 30px 30px 0 0; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-circle { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: var(--wa-border); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; border: 1px solid #444; }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: #8696a0; font-size: 0.65rem; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--wa-green); }

        .rh-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border-radius: 12px; transform: rotate(45deg); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(162, 155, 254, 0.4); }
        .rh-btn i { transform: rotate(-45deg); color: white; font-size: 1.4rem; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .video-box { position: relative; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 1; border: 1px solid var(--wa-border); }
        .video-box.main { grid-column: 1 / 3; aspect-ratio: 16/9; border: 2px solid var(--wa-green); }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <input type="file" id="import-input" class="hidden" accept=".json" onchange="window.handleImport(event)">

    <div class="mobile-screen">
        <header class="app-header">
            <div class="flex items-center gap-3">
                <div class="logo-circle" style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg, #00a884, #028266); display:flex; justify-content:center; align-items:center; font-family:'Orbitron'; color:white; font-size:0.8rem;">HF</div>
                <span class="font-bold text-white tracking-wide">Hello Friends</span>
            </div>
            <div class="flex gap-5 text-[#8696a0] text-2xl items-center">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-ellipsis-vertical cursor-pointer" onclick="window.toggleDropdown(event)"></i>
            </div>

            <div id="main-dropdown" class="dropdown-menu">
                <div class="flex justify-between items-center mb-3 border-b border-[#202c33] pb-2">
                    <span class="text-white text-xs font-bold uppercase tracking-widest">Settings</span>
                    <i class="fa-solid fa-xmark text-gray-500" onclick="window.hideDropdown()"></i>
                </div>
                <a onclick="window.showProfile()"><i class="fa-solid fa-user text-[#00a884]"></i> My Profile</a>
                <a onclick="window.cycleLang()"><i class="fa-solid fa-globe text-blue-400"></i> <span id="lang-label">Lang: EN</span></a>
                <a onclick="window.showBank()"><i class="fa-solid fa-wallet text-yellow-500"></i> Wallet</a>
                <div class="h-[1px] bg-[#202c33] my-2"></div>
                <a onclick="window.doExport()"><i class="fa-solid fa-file-export text-blue-300"></i> Export Data</a>
                <a onclick="document.getElementById('import-input').click()"><i class="fa-solid fa-file-import text-green-300"></i> Import Data</a>
                <div class="mt-4 pt-2 border-t border-[#202c33] text-center"><span class="text-[#00a884] text-[10px] font-bold tracking-widest">AUTHOR: ILGAR</span></div>
            </div>
        </header>

        <div class="screen-container">
            
            <div id="screen-0" class="page-content active">
                <div class="marquee-bar">
                    <i class="fa-solid fa-closed-captioning text-[#00a884] ml-3"></i>
                    <div class="marquee-text" id="chat-marquee">AI Translation System Active...</div>
                </div>
                <div class="flex flex-grow overflow-hidden">
                    <div id="sidebar" class="chat-sidebar"></div>
                    <div class="flex flex-col flex-grow relative bg-[#0b141a]">
                        <div id="chat-box" class="chat-messages"></div>
                        <div class="input-area">
                            <i class="fa-regular fa-face-smile text-[#8696a0] text-2xl"></i>
                            <div class="pill-input"><input type="text" id="chat-input" placeholder="Message..."></div>
                            <button class="w-11 h-11 rounded-full bg-[#00a884] flex items-center justify-center shadow-lg" onclick="window.sendMessage()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-1" class="page-content">
                <div class="flex justify-center py-6 bg-[#111b21] border-b border-[#202c33]">
                    <h2 class="text-4xl text-[#a29bfe]" style="font-family: 'Allura', cursive;">Voice Room</h2>
                </div>
                <div class="flex-grow flex flex-col items-center justify-center gap-10">
                    <div class="flex items-center gap-8">
                        <img id="v-friend-img" src="https://ui-avatars.com/api/?name=F&background=random" class="w-24 h-24 rounded-full border-2 border-gray-600 object-cover">
                        <div class="flex gap-2"><div class="w-1.5 h-10 bg-[#00a884] animate-bounce"></div><div class="w-1.5 h-14 bg-[#00a884] animate-bounce" style="animation-delay: 0.2s"></div></div>
                        <img id="v-me-img" src="" class="w-24 h-24 rounded-full border-4 border-[#00a884] object-cover">
                    </div>
                    <div class="marquee-bar w-full"><div class="marquee-text" id="voice-marquee">Ready for instant voice translation...</div></div>
                </div>
                <div class="input-area">
                    <div class="pill-input"><input type="text" id="voice-input" placeholder="Translate voice..."></div>
                    <button class="w-11 h-11 rounded-full bg-red-500 shadow-lg" onclick="window.changeTab(0)"><i class="fa-solid fa-phone-slash text-white"></i></button>
                    <button class="w-11 h-11 rounded-full bg-[#00a884] shadow-lg" onclick="window.sendVoice()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                </div>
            </div>

            <div id="screen-2" class="page-content">
                <div class="flex justify-between items-center px-4 py-3 bg-[#111b21] border-b border-[#202c33]">
                    <span class="text-[#00a884] font-bold tracking-widest uppercase">Conference</span>
                    <span class="text-red-500 animate-pulse font-bold text-xs">● REC</span>
                </div>
                <div id="conf-grid" class="video-grid"></div>
                <div class="flex justify-center items-center gap-6 py-4 bg-[#111b21]">
                    <button class="w-12 h-12 rounded-full bg-[#202c33] text-[#00a884] flex items-center justify-center text-xl shadow-lg" onclick="window.toggleCC()"><i class="fa-solid fa-closed-captioning"></i></button>
                    <button id="cam-btn" class="w-12 h-12 rounded-full bg-[#202c33] text-white flex items-center justify-center text-xl shadow-lg" onclick="window.toggleCamera()"><i class="fa-solid fa-video"></i></button>
                    <button class="w-12 h-12 rounded-full bg-red-500 text-white flex items-center justify-center text-xl shadow-lg" onclick="window.changeTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
                <div class="input-area">
                    <div class="pill-input"><input type="text" id="conf-input" placeholder="Meet chat..."></div>
                    <button class="w-11 h-11 rounded-full bg-[#00a884] shadow-lg" onclick="window.sendConf()"><i class="fa-solid fa-paper-plane text-black"></i></button>
                </div>
            </div>

            <div id="screen-3" class="page-content">
                <div class="p-5 overflow-y-auto">
                    <h2 class="text-2xl font-bold text-white mb-6">Global Talents</h2>
                    <div id="prof-list" class="grid grid-cols-2 gap-4 pb-24"></div>
                </div>
            </div>

            <div id="screen-4" class="page-content">
                <div class="flex flex-col items-center justify-center h-full gap-10">
                    <h2 class="text-3xl font-bold text-white">Social Hub</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <a href="https://facebook.com" target="_blank" class="bg-[#202c33] p-10 rounded-[40px] shadow-2xl transition hover:scale-105"><i class="fa-brands fa-facebook text-6xl text-blue-500"></i></a>
                        <a href="https://instagram.com" target="_blank" class="bg-[#202c33] p-10 rounded-[40px] shadow-2xl transition hover:scale-105"><i class="fa-brands fa-instagram text-6xl text-pink-500"></i></a>
                    </div>
                </div>
            </div>

        </div>

        <nav class="nav-footer">
            <div class="nav-item active" onclick="window.changeTab(0)"><i class="fa-solid fa-message text-2xl"></i><span data-i18n="chat">Chat</span></div>
            <div class="nav-item" onclick="window.changeTab(1)"><i class="fa-solid fa-microphone-lines text-2xl"></i><span data-i18n="voice">Voice</span></div>
            <div class="nav-item" onclick="window.changeTab(2)"><i class="fa-solid fa-video text-2xl"></i><span data-i18n="meet">Meet</span></div>
            <div class="nav-item" onclick="window.changeTab(3)"><i class="fa-solid fa-briefcase text-2xl"></i><span data-i18n="cv">CV</span></div>
            <div class="nav-item" onclick="window.changeTab(4)"><i class="fa-solid fa-hashtag text-2xl"></i><span data-i18n="social">Social</span></div>
            <div class="rhombus-wrapper">
                <div class="rh-btn" onclick="window.toggleRhombus()"><i class="fa-solid fa-plus"></i></div>
                <div id="rh-menu" class="dropdown-menu" style="bottom:75px; right:0;">
                    <div class="flex flex-col gap-2">
                        <button onclick="window.openMap()" class="flex items-center gap-3 p-3 bg-[#202c33] rounded-xl text-white"><i class="fa-solid fa-location-dot text-red-500"></i> Location</button>
                        <button onclick="window.clearChat()" class="flex items-center gap-3 p-3 bg-[#202c33] rounded-xl text-white"><i class="fa-solid fa-trash text-red-400"></i> Clear</button>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div id="modal-profile" class="app-modal">
        <div class="modal-content">
            <div class="close-circle" onclick="window.hideModals()"><i class="fa-solid fa-xmark"></i></div>
            <h2 class="text-xl font-bold text-white text-center mb-6 uppercase tracking-widest">My Identity</h2>
            <div class="flex justify-center mb-6"><div class="relative"><img id="p-img" src="" class="w-24 h-24 rounded-full border-2 border-[#00a884] object-cover"><button onclick="document.getElementById('file-in').click()" class="absolute bottom-0 right-0 bg-[#00a884] w-8 h-8 rounded-full flex items-center justify-center text-black border-2 border-black shadow-lg"><i class="fa-solid fa-camera"></i></button></div></div>
            <input type="file" id="file-in" class="hidden" onchange="window.doPreview(event)">
            <input type="text" id="p-name-in" class="w-full p-4 rounded-xl bg-[#202c33] text-white border border-[#2a3942] mb-4 outline-none" placeholder="Enter Full Name">
            <select id="p-country-in" class="w-full p-4 rounded-xl bg-[#202c33] text-white border border-[#2a3942] mb-4 outline-none" onchange="window.setPrefix(this)">
                <option value="un" data-flag="🌐" data-lang="en">Global</option>
                <option value="az" data-flag="🇦🇿" data-lang="az">Azerbaijan</option>
                <option value="ru" data-flag="🇷🇺" data-lang="ru">Russia</option>
                <option value="us" data-flag="🇺🇸" data-lang="en">USA</option>
            </select>
            <input type="tel" id="p-phone-in" class="w-full p-4 rounded-xl bg-[#202c33] text-white border border-[#2a3942] mb-6 outline-none" placeholder="Phone Number">
            <button onclick="window.saveProf()" class="w-full p-5 rounded-2xl bg-[#00a884] text-black font-bold shadow-xl active:scale-95 transition">SAVE PROFILE</button>
        </div>
    </div>

    <div id="modal-cv" class="app-modal">
        <div class="modal-content">
            <div class="close-circle" onclick="window.hideModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="cv-body" class="text-white text-center"></div>
            <div class="flex gap-3 mt-8">
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl border border-white/5 shadow-lg" onclick="window.changeTab(0); window.hideModals()"><i class="fa-solid fa-comment text-[#00a884] text-2xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl border border-white/5 shadow-lg"><i class="fa-solid fa-phone text-blue-400 text-2xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl border border-white/5 shadow-lg"><i class="fa-solid fa-envelope text-red-400 text-2xl"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-map" class="app-modal">
        <div class="modal-content h-[75vh]">
            <div class="close-circle" onclick="window.hideModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="map-target" class="w-full h-full rounded-2xl bg-black overflow-hidden flex items-center justify-center text-gray-500">Connecting to Satellites...</div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = { apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40", authDomain: "hello-friends-p8p3i7.firebaseapp.com", databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "hello-friends-p8p3i7" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // STATE
        window.myUid = localStorage.getItem('hf_uid_v21') || 'uid_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hf_uid_v21', window.myUid);
        window.myProf = JSON.parse(localStorage.getItem('hf_prof_v21')) || { name: 'Guest', flag: '🌐', lang: 'en', photo: 'https://ui-avatars.com/api/?name=Guest&background=random' };
        window.users = [];

        // NAVIGATION (ROCK SOLID)
        window.changeTab = (idx) => {
            const screens = document.querySelectorAll('.page-content');
            const navs = document.querySelectorAll('.nav-item');
            screens.forEach((s, i) => s.classList.toggle('active', i === idx));
            navs.forEach((n, i) => n.classList.toggle('active', i === idx));
            window.hideDropdown();
        };

        // CHAT (MULTIPLAYER SYNC)
        window.sendMessage = () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            db.ref("global_live_v22").push({
                text: input.value, 
                name: window.myProf.name,
                uid: window.myUid,
                flag: window.myProf.flag,
                lang: window.myProf.lang,
                photo: window.myProf.photo
            });
            input.value = '';
        };

        db.ref("global_live_v22").on("child_added", async (snap) => {
            const data = snap.val();
            const isMe = data.uid === window.myUid;
            
            // Sync Foreign Users
            if(!isMe && !window.users.find(u => u.uid === data.uid)) {
                window.users.push(data);
                window.refreshSidebar();
            }

            const box = document.getElementById('chat-box');
            const wrap = document.createElement('div');
            wrap.className = `flex gap-2 w-full mt-2 ${isMe ? 'justify-end' : 'justify-start'}`;
            wrap.innerHTML = `
                ${!isMe ? `<img src="${data.photo}" class="w-10 h-10 rounded-full self-end object-cover border border-[#202c33]" onclick="window.openCV('${data.uid}')">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe ? `<div class="text-[10px] font-bold text-[#00a884] ml-1 mb-1">${data.name}</div>` : ''}
                    <div class="chat-bubble ${isMe ? 'bg-[#005c4b]' : 'bg-[#202c33] shadow-lg'}">${data.text}</div>
                </div>
            `;
            box.appendChild(wrap);

            // AUTO-TRANSLATE
            if(!isMe) {
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${window.myProf.lang}&dt=t&q=${encodeURIComponent(data.text)}`).then(r => r.json());
                    const translated = res[0][0][0];
                    const tDiv = document.createElement('div');
                    tDiv.className = `flex w-full mt-1 ${isMe ? 'justify-end' : 'justify-start pl-12'}`;
                    tDiv.innerHTML = `<div class="text-yellow-400 text-[11px] font-bold tracking-wide">${data.flag} ${translated}</div>`;
                    box.appendChild(tDiv);
                    
                    const mText = document.getElementById('chat-marquee');
                    mText.innerHTML = `${data.name}: ${translated} • `;
                    mText.style.animation = 'none'; void mText.offsetWidth; mText.style.animation = null;
                } catch(e) {}
            }
            box.scrollTop = box.scrollHeight;
        });

        window.refreshSidebar = () => {
            const side = document.getElementById('sidebar');
            side.innerHTML = '<div class="w-12 h-12 rounded-full bg-[#005c4b] flex items-center justify-center text-white border-2 border-white/20">🌍</div>';
            window.users.forEach(u => {
                side.innerHTML += `<div class="relative" onclick="window.openCV('${u.uid}')"><img src="${u.photo}" class="w-12 h-12 rounded-full object-cover border-2 border-white/10"><span class="absolute -bottom-1 -right-1 text-[10px] bg-black px-1 rounded-full border border-white/20">${u.flag}</span></div>`;
            });
        };

        // PROFILE SYSTEM
        window.saveProf = () => {
            const name = document.getElementById('p-name-in').value || 'User';
            const country = document.getElementById('p-country-in');
            const opt = country.options[country.selectedIndex];
            window.myProf = {
                name: name,
                flag: opt.getAttribute('data-flag'),
                lang: opt.getAttribute('data-lang'),
                photo: window.tempImg || `https://ui-avatars.com/api/?name=${name}&background=random`
            };
            localStorage.setItem('hf_prof_v21', JSON.stringify(window.myProf));
            window.hideModals();
            location.reload();
        };

        window.setPrefix = (s) => {
            const prefixes = { az: '+994 ', ru: '+7 ', us: '+1 ', un: '+ ' };
            document.getElementById('p-phone-in').value = prefixes[s.value] || '+ ';
        };

        window.doPreview = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { window.tempImg = ev.target.result; document.getElementById('p-img').src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        // MODALS & MENUS
        window.toggleDropdown = (e) => { e.stopPropagation(); document.getElementById('main-dropdown').classList.toggle('active'); };
        window.hideDropdown = () => document.getElementById('main-dropdown').classList.remove('active');
        window.toggleRhombus = () => document.getElementById('rh-menu').classList.toggle('active');
        window.hideModals = () => document.querySelectorAll('.app-modal').forEach(m => m.classList.remove('active'));
        window.showProfile = () => { document.getElementById('modal-profile').classList.add('active'); window.hideDropdown(); };
        window.showBank = () => { alert("Bank System Online!"); window.hideDropdown(); };
        
        window.openCV = (uid) => {
            const u = window.users.find(x => x.uid === uid) || (uid === window.myUid ? window.myProf : null);
            if(!u) return;
            document.getElementById('cv-body').innerHTML = `<img src="${u.photo}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-[#00a884]"><h3 class="text-2xl font-bold">${u.name}</h3><p class="text-gray-400 mt-2">Language: ${u.lang.toUpperCase()}</p><div class="text-green-500 font-bold mt-2">● ONLINE</div>`;
            document.getElementById('modal-cv').classList.add('active');
        };

        window.openMap = () => {
            document.getElementById('modal-map').classList.add('active');
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('map-target').innerHTML = `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}&z=15&output=embed" style="border:none;"></iframe>`;
            }, () => { document.getElementById('map-target').innerText = "GPS Access Denied"; });
        };

        window.doExport = () => {
            const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
        };

        // STARTUP
        if(!localStorage.getItem('hf_prof_v21')) window.showProfile();
        document.getElementById('v-me-img').src = window.myProf.photo;
        document.getElementById('p-img').src = window.myProf.photo;
        document.getElementById('p-name-in').value = window.myProf.name;
        document.body.addEventListener('click', () => { window.hideDropdown(); document.getElementById('rh-menu').classList.remove('active'); });

    </script>
</body>
</html>
