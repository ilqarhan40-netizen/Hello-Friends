<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Stable 20.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Allura&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #111b21; --wa-border: #202c33; --wa-green: #00a884; --wa-msg-out: #005c4b; --wa-msg-in: #202c33; --wa-text: #e9edef; }
        
        body { background-color: #000; font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .mobile-screen { width: 100%; max-width: 450px; height: 100%; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* ЖЕЛЕЗОБЕТОННАЯ ИЗОЛЯЦИЯ (БАЗА 20.1) */
        .page-content { display: none !important; flex-grow: 1; flex-direction: column; overflow: hidden; background: var(--wa-bg); height: 100%; width: 100%; }
        .page-content.active { display: flex !important; }

        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); z-index: 100; flex-shrink: 0; height: 60px; }
        .nav-footer { display: flex; justify-content: space-around; align-items: center; background: var(--wa-panel); border-top: 1px solid var(--wa-border); padding: 10px; flex-shrink: 0; z-index: 100; height: 70px; }

        .chat-sidebar { width: 75px; flex-shrink: 0; border-right: 1px solid var(--wa-border); overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 12px; background: var(--wa-panel); }
        .chat-messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 16px; gap: 4px; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; max-width: 85%; color: white; }
        
        .chat-input-area { display: flex; align-items: center; padding: 10px 12px; background: var(--wa-panel); gap: 8px; flex-shrink: 0; border-top: 1px solid var(--wa-border); height: 65px; }
        .chat-input-pill { flex-grow: 1; background: var(--wa-border); border-radius: 24px; display: flex; align-items: center; padding: 6px 14px; }
        .chat-input-pill input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        .marquee-bar { width: 100%; background: var(--wa-panel); overflow: hidden; padding: 6px 10px; border-bottom: 1px solid var(--wa-border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; height: 35px; }
        .marquee-text { display: inline-block; white-space: nowrap; animation: scroll 10s linear infinite; font-size: 0.75rem; color: var(--wa-green); font-weight: bold; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .header-dropdown { position: absolute; top: 60px; right: 10px; width: 230px; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 14px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); display: none; flex-direction: column; gap: 4px; z-index: 200; }
        .header-dropdown.active { display: flex; }
        .header-dropdown a { color: var(--wa-text); font-size: 0.9rem; padding: 10px 8px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        .nav-item { color: #8696a0; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--wa-green); }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="mobile-screen">
        
        <header class="app-header">
            <div class="flex items-center gap-3">
                <div class="w-[34px] h-[34px] rounded-full bg-gradient-to-br from-[#00a884] to-[#028266] flex justify-center items-center font-bold text-white text-sm">HF</div>
                <span class="font-bold text-white text-lg">Hello Friends</span>
            </div>
            <div class="flex gap-4 text-[#8696a0] text-2xl items-center">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-ellipsis-vertical cursor-pointer" onclick="window.toggleHeaderMenu(event)"></i>
            </div>
            
            <div id="header-dropdown" class="header-dropdown">
                <div class="flex justify-between items-center px-1 pb-2 mb-2 border-b border-[#202c33]">
                    <span class="text-white font-bold text-xs uppercase">Settings</span>
                </div>
                <a onclick="alert('Profile open')"><i class="fa-solid fa-user text-[#00a884] w-5"></i> My Profile</a>
                <a onclick="alert('Language changed')"><i class="fa-solid fa-globe text-blue-400 w-5"></i> Lang: EN</a>
            </div>
        </header>

        <main class="flex-grow relative flex flex-col overflow-hidden">
            
            <div id="screen-chat" class="page-content active">
                <div class="marquee-bar">
                    <i class="fa-solid fa-closed-captioning text-[#00a884]"></i>
                    <div class="overflow-hidden flex-grow"><span class="marquee-text" id="chat-marquee">AI Translation Active...</span></div>
                </div>
                <div class="flex flex-grow overflow-hidden bg-[#0b141a]">
                    <div class="chat-sidebar" id="chat-sidebar"></div>
                    <div class="flex flex-col flex-grow relative">
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input-area">
                            <i class="fa-regular fa-face-smile text-[#8696a0] text-xl"></i>
                            <div class="chat-input-pill"><input type="text" id="chat-input" placeholder="Message..."></div>
                            <button class="w-[40px] h-[40px] rounded-full bg-[#00a884] flex justify-center items-center text-black" onclick="window.sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-voice" class="page-content">
                <div class="flex justify-center py-4 bg-[#111b21] border-b border-[#202c33] shrink-0">
                    <h2 class="text-3xl text-[#a29bfe]" style="font-family: 'Allura', cursive;">Voice Room</h2>
                </div>
                <div class="flex-grow flex flex-col justify-center items-center">
                    <div class="flex items-center gap-6">
                        <img src="https://ui-avatars.com/api/?name=Friend" class="w-20 h-20 rounded-full border-2 border-gray-600">
                        <div class="flex gap-1 text-[#00a884]"><div class="w-1.5 h-8 bg-[#00a884] animate-bounce"></div><div class="w-1.5 h-12 bg-[#00a884] animate-bounce" style="animation-delay: 0.1s"></div></div>
                        <img src="https://ui-avatars.com/api/?name=Me" class="w-20 h-20 rounded-full border-4 border-[#00a884]">
                    </div>
                </div>
                <div class="chat-input-area bg-[#111b21]">
                    <div class="chat-input-pill"><input type="text" id="voice-input" placeholder="Voice text..."></div>
                    <button class="w-[40px] h-[40px] rounded-full bg-[#202c33] text-[#8696a0] flex justify-center items-center" onclick="alert('Mic On')"><i class="fa-solid fa-microphone"></i></button>
                    <button class="w-[40px] h-[40px] rounded-full bg-[#00a884] text-black flex justify-center items-center" onclick="alert('Voice Sent')"><i class="fa-solid fa-paper-plane"></i></button>
                    <button class="w-[40px] h-[40px] rounded-full bg-red-500 text-white flex justify-center items-center shadow-lg" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

            <div id="screen-meet" class="page-content">
                <div class="flex justify-between items-center px-4 py-3 bg-[#111b21] border-b border-[#202c33] shrink-0">
                    <span class="text-[#00a884] font-bold">CONFERENCE</span><span class="text-red-500 animate-pulse text-xs">● REC</span>
                </div>
                <div class="flex-grow p-2"></div>
                <div class="flex justify-center items-center gap-6 py-3 bg-[#111b21] shrink-0">
                    <button class="w-[44px] h-[44px] rounded-full bg-[#202c33] text-[#00a884] text-xl"><i class="fa-solid fa-closed-captioning"></i></button>
                    <button class="w-[44px] h-[44px] rounded-full bg-[#202c33] text-white text-xl"><i class="fa-solid fa-video"></i></button>
                    <button class="w-[44px] h-[44px] rounded-full bg-red-500 text-white text-xl shadow-lg" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

            <div id="screen-cv" class="page-content">
                <div class="p-4 overflow-y-auto h-full">
                    <h2 class="text-xl font-bold text-white mb-4">Global Talents</h2>
                </div>
            </div>

        </main>

        <nav class="nav-footer">
            <div class="nav-item active" onclick="window.switchTab(0)"><i class="fa-solid fa-message text-xl"></i><span>Chat</span></div>
            <div class="nav-item" onclick="window.switchTab(1)"><i class="fa-solid fa-microphone-lines text-xl"></i><span>Voice</span></div>
            <div class="nav-item" onclick="window.switchTab(2)"><i class="fa-solid fa-video text-xl"></i><span>Meet</span></div>
            <div class="nav-item" onclick="window.switchTab(3)"><i class="fa-solid fa-briefcase text-xl"></i><span>CV</span></div>
        </nav>
    </div>

    <script>
        // БЕЗОШИБОЧНАЯ ЛОГИКА ВКЛАДОК
        window.switchTab = function(index) {
            const screens = ['screen-chat', 'screen-voice', 'screen-meet', 'screen-cv'];
            const navItems = document.querySelectorAll('.nav-item');
            const pages = document.querySelectorAll('.page-content');
            
            pages.forEach(p => p.classList.remove('active'));
            navItems.forEach(n => n.classList.remove('active'));
            
            const targetScreen = document.getElementById(screens[index]);
            if(targetScreen) targetScreen.classList.add('active');
            if(navItems[index]) navItems[index].classList.add('active');
        };

        // ОТКРЫТИЕ И ЗАКРЫТИЕ МЕНЮ (ПО ЛЮБОМУ КЛИКУ)
        window.toggleHeaderMenu = function(e) {
            e.stopPropagation();
            document.getElementById('header-dropdown').classList.toggle('active');
        };

        document.addEventListener('click', function() {
            const menu = document.getElementById('header-dropdown');
            if(menu && menu.classList.contains('active')) {
                menu.classList.remove('active');
            }
        });

        // БАЗОВЫЙ ЧАТ (ДЛЯ ТЕСТА ВЕРСТКИ)
        window.sendMsg = function() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const chat = document.getElementById('chat-messages');
            const row = document.createElement('div');
            row.className = "flex gap-2 w-full mt-2 justify-end";
            row.innerHTML = `<div class="chat-bubble bg-[#005c4b] text-white shadow-md">${text}</div>`;
            chat.appendChild(row);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        };

        // Включаем первую вкладку при старте
        window.switchTab(0);
    </script>
</body>
</html>
