<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Golden Master Fixed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Allura&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #111b21; --wa-border: #202c33; --wa-green: #00a884; --wa-msg-out: #005c4b; --wa-msg-in: #202c33; --wa-text: #e9edef; --wa-text-muted: #8696a0; --hf-purple: #a29bfe; }
        
        /* БЛОКИРОВКА ЭКРАНА ОТ ПРОКРУТКИ */
        body, html { background-color: #000; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        
        .mobile-screen { width: 100%; max-width: 450px; height: 100%; background: var(--wa-bg); display: flex; flex-direction: column; position: relative; }
        @media (min-width: 500px) { .mobile-screen { height: 90vh; margin-top: 5vh; border-radius: 30px; border: 4px solid #1f2937; overflow: hidden; } }

        /* НАМЕРТВО ЗАКРЕПЛЕННЫЕ ШАПКА И ПОДВАЛ */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; height: 60px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); z-index: 100; flex-shrink: 0; }
        .bottom-nav-container { display: flex; justify-content: space-between; align-items: center; background: var(--wa-panel); border-top: 1px solid var(--wa-border); padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); flex-shrink: 0; z-index: 100; width: 100%; height: 75px; }

        /* ИЗОЛЯТОР ЭКРАНОВ (Ключевой фикс) */
        .main-container { flex-grow: 1; position: relative; width: 100%; overflow: hidden; }
        .page-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none !important; flex-direction: column; background: var(--wa-bg); z-index: 1; overflow: hidden; }
        .page-content.active { display: flex !important; z-index: 10; }

        /* ЭЛЕМЕНТЫ ШАПКИ */
        .logo-circle { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--wa-green), #028266); display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: white; }
        .header-dropdown { position: absolute; top: 60px; right: 10px; width: 230px; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 14px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); display: none; flex-direction: column; gap: 4px; z-index: 200; }
        .header-dropdown.active { display: flex; }
        .header-dropdown a { color: var(--wa-text); font-size: 0.9rem; padding: 10px 8px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* ЧАТ МЕХАНИКА */
        .chat-sidebar { width: 75px; flex-shrink: 0; border-right: 1px solid var(--wa-border); overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 12px; background: var(--wa-panel); }
        .chat-contact { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 100%; }
        .chat-contact-icon { width: 48px; height: 48px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid transparent; position: relative; }
        .chat-contact.active-room .chat-contact-icon { border-color: var(--wa-green); }
        
        .chat-messages { flex-grow: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; padding: 16px; gap: 6px; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; max-width: 85%; }
        .incoming { align-self: flex-start; } .incoming .chat-bubble { background: var(--wa-msg-in); border-bottom-left-radius: 4px; }
        .outgoing { align-self: flex-end; } .outgoing .chat-bubble { background: var(--wa-msg-out); border-bottom-right-radius: 4px; color: white; }

        /* ВВОД СООБЩЕНИЙ */
        .chat-input-area { display: flex; align-items: center; padding: 10px 12px; background: var(--wa-panel); gap: 8px; flex-shrink: 0; border-top: 1px solid var(--wa-border); height: 65px; }
        .chat-input-pill { flex-grow: 1; background: var(--wa-border); border-radius: 24px; display: flex; align-items: center; padding: 6px 14px; }
        .chat-input-pill input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1rem; }
        .circle-btn { width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; }

        /* НАВИГАЦИЯ */
        .nav-links-wrapper { display: flex; justify-content: space-around; flex-grow: 1; padding-right: 10px; }
        .nav-item { color: var(--wa-text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 600; cursor: pointer; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: var(--wa-green); }

        /* РОМБ */
        .rhombus-wrapper { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
        .rhombus-btn { width: 100%; height: 100%; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border-radius: 12px; transform: rotate(45deg); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .rhombus-btn i { transform: rotate(-45deg); color: white; font-size: 1.2rem; }
        .rhombus-menu { position: absolute; bottom: 65px; right: 0; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 12px; display: none; grid-template-columns: repeat(3, 1fr); gap: 12px; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .rhombus-menu.active { display: grid; }

        /* ШТОРКИ */
        .app-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); }
        .app-modal.active { display: flex !important; }
        .app-modal-content { background: var(--wa-panel); width: 100%; max-width: 450px; border-radius: 30px 30px 0 0; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-sheet-btn { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: var(--wa-border); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 50; }

        /* ВИДЕО И МАРКИ */
        .marquee-bar { height: 35px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); overflow: hidden; display: flex; align-items: center; flex-shrink: 0;}
        .marquee-text { white-space: nowrap; animation: scroll-wa 15s linear infinite; color: var(--wa-green); font-size: 0.75rem; font-weight: bold; padding-left: 100%; }
        @keyframes scroll-wa { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; overflow-y: auto; min-height: 0; flex-grow: 1; }
        .video-box { position: relative; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 1; border: 1px solid var(--wa-border); }
        .video-box.main { grid-column: 1 / 3; aspect-ratio: 16/9; border: 2px solid var(--wa-green); }
        .video-box video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

        .form-input-box { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--wa-border); background: var(--wa-bg); color: white; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
        .btn-primary { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--wa-green); color: #111b21; font-weight: 700; font-size: 1rem; cursor: pointer; }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="mobile-screen">
        
        <header class="app-header">
             <div class="logo-container">
                <div class="logo-circle">HF</div>
                <span class="text-white font-bold text-lg">Hello Friends</span>
             </div>
             <div class="flex gap-5 text-[#8696a0] text-2xl">
                <i class="fa-solid fa-ellipsis-vertical cursor-pointer" onclick="window.toggleHeaderMenu(event)"></i>
            </div>
            
            <div id="header-dropdown" class="header-dropdown">
                <div class="flex justify-between items-center mb-3 border-b border-[#202c33] pb-2">
                    <span class="text-white text-xs font-bold uppercase tracking-widest">Settings</span>
                    <i class="fa-solid fa-xmark text-gray-500 cursor-pointer" onclick="window.closeDropdown()"></i>
                </div>
                <a onclick="window.openProfile()"><i class="fa-solid fa-user text-[#00a884]"></i> My Profile</a>
                <a onclick="window.toggleLang()"><i class="fa-solid fa-globe text-blue-400"></i> <span>Lang: EN</span></a>
                <a onclick="window.openLocation()"><i class="fa-solid fa-location-dot text-red-500"></i> Location</a>
            </div>
        </header>

        <main class="main-container">
            
            <div id="message" class="page-content active">
                <div class="marquee-bar">
                    <i class="fa-solid fa-closed-captioning text-[#00a884] ml-3"></i>
                    <div class="marquee-text" id="chat-marquee">AI Translation Active...</div>
                </div>
                <div class="flex flex-grow overflow-hidden">
                    <div class="chat-sidebar" id="sidebar"></div>
                    <div class="flex flex-col flex-grow bg-[#0b141a]">
                        <div class="chat-messages" id="chat-box"></div>
                        <div class="chat-input-area">
                            <div class="chat-input-pill"><input type="text" id="chat-input" placeholder="Message..."></div>
                            <button class="circle-btn bg-[#00a884] text-black" onclick="window.sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="voice-translator" class="page-content bg-[#0b141a]">
                <div class="flex justify-center py-5 bg-[#111b21] border-b border-[#202c33] shrink-0">
                    <h2 class="text-3xl text-white" style="font-family: 'Allura', cursive; color: var(--hf-purple);">Voice Room</h2>
                </div>
                <div class="flex-grow flex flex-col items-center justify-center gap-8">
                    <div class="flex items-center gap-6">
                        <img id="v-friend-img" src="https://ui-avatars.com/api/?name=Friend&background=random" class="w-24 h-24 rounded-full border-2 border-gray-600 object-cover">
                        <div class="flex gap-2 text-[#00a884]"><div class="w-1.5 h-8 bg-[#00a884] rounded-full animate-bounce"></div><div class="w-1.5 h-12 bg-[#00a884] rounded-full animate-bounce" style="animation-delay: 0.2s"></div></div>
                        <img id="v-me-img" src="" class="w-24 h-24 rounded-full border-4 border-[#00a884] object-cover">
                    </div>
                    <div class="marquee-bar w-full"><div class="marquee-text" id="voice-marquee">Ready for voice...</div></div>
                </div>
                <div class="chat-input-area">
                    <div class="chat-input-pill"><input type="text" id="voice-input" placeholder="Translate voice..."></div>
                    <button class="circle-btn bg-[#202c33] text-[#8696a0] border border-[#2a3942]" onclick="alert('Mic Active!')"><i class="fa-solid fa-microphone"></i></button>
                    <button class="circle-btn bg-[#00a884] text-black" onclick="window.sendVoice()"><i class="fa-solid fa-paper-plane"></i></button>
                    <button class="circle-btn bg-red-500 text-white" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

            <div id="conference" class="page-content bg-[#000]">
                <div class="flex justify-between items-center px-4 py-3 bg-[#111b21] border-b border-[#202c33] font-bold text-xs uppercase text-[#00a884] shrink-0">
                    <span>CONFERENCE</span><span class="text-red-500 animate-pulse">● REC</span>
                </div>
                <div id="conf-grid" class="video-grid"></div>
                <div class="chat-input-area justify-center gap-6">
                    <button class="circle-btn bg-[#202c33] text-[#00a884]"><i class="fa-solid fa-closed-captioning"></i></button>
                    <button class="circle-btn bg-[#202c33] text-white"><i class="fa-solid fa-video"></i></button>
                    <button class="circle-btn bg-red-500 text-white" onclick="window.switchTab(0)"><i class="fa-solid fa-phone-slash"></i></button>
                </div>
            </div>

            <div id="profession" class="page-content bg-[#0b141a]">
                <div class="flex-grow overflow-y-auto p-4 min-height-0">
                    <h2 class="text-2xl font-bold text-white mb-6">Global Talents</h2>
                    <div id="prof-list" class="grid grid-cols-2 gap-4 pb-10"></div>
                </div>
            </div>

            <div id="social" class="page-content bg-[#0b141a]">
                <div class="flex flex-col items-center justify-center h-full gap-8">
                    <h2 class="text-3xl font-bold text-white">Social Hub</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <a href="https://facebook.com" class="bg-[#202c33] p-8 rounded-3xl text-center"><i class="fa-brands fa-facebook text-5xl text-blue-500"></i></a>
                        <a href="https://instagram.com" class="bg-[#202c33] p-8 rounded-3xl text-center"><i class="fa-brands fa-instagram text-5xl text-pink-500"></i></a>
                    </div>
                </div>
            </div>

        </main>

        <nav class="bottom-nav-container">
            <div class="nav-links-wrapper">
                <div class="nav-item active" onclick="window.switchTab(0)"><i class="fa-solid fa-message"></i><span>Chat</span></div>
                <div class="nav-item" onclick="window.switchTab(1)"><i class="fa-solid fa-microphone-lines"></i><span>Voice</span></div>
                <div class="nav-item" onclick="window.switchTab(2)"><i class="fa-solid fa-video"></i><span>Meet</span></div>
                <div class="nav-item" onclick="window.switchTab(3)"><i class="fa-solid fa-briefcase"></i><span>CV</span></div>
                <div class="nav-item" onclick="window.switchTab(4)"><i class="fa-solid fa-hashtag"></i><span>Social</span></div>
            </div>
            <div class="rhombus-wrapper">
                <div id="rh-btn" class="rhombus-btn" onclick="window.toggleRhombus(event)"><i class="fa-solid fa-plus"></i></div>
                <div id="rh-menu" class="rhombus-menu">
                    <div class="action-icon" onclick="window.clearChat()"><i class="fa-solid fa-trash text-red-500"></i></div>
                    <div class="action-icon" onclick="window.switchTab(2)"><i class="fa-solid fa-video text-blue-400"></i></div>
                </div>
            </div>
        </nav>
    </div>

    <div id="modal-identity" class="app-modal" onclick="if(event.target===this) window.closeModals()">
        <div class="app-modal-content">
            <div class="close-sheet-btn" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <h2 class="text-xl font-bold text-white text-center mb-6 uppercase tracking-widest">My Profile</h2>
            <div class="flex justify-center mb-6"><div class="relative"><img id="p-img" src="" class="w-24 h-24 rounded-full border-2 border-[#00a884] object-cover"><button onclick="document.getElementById('file-in').click()" class="absolute bottom-0 right-0 bg-[#00a884] w-8 h-8 rounded-full flex items-center justify-center text-black"><i class="fa-solid fa-camera"></i></button></div></div>
            <input type="file" id="file-in" class="hidden" onchange="window.doPreview(event)">
            <input type="text" id="p-name" class="form-input-box" placeholder="Name">
            <select id="p-country" class="form-input-box">
                <option value="un">Global 🌐</option><option value="az">Azerbaijan 🇦🇿</option><option value="ru">Russia 🇷🇺</option><option value="us">USA 🇺🇸</option>
            </select>
            <input type="tel" id="p-phone" class="form-input-box" placeholder="Phone">
            <button onclick="window.saveProfile()" class="btn-primary">SAVE</button>
        </div>
    </div>

    <div id="modal-cv" class="app-modal" onclick="if(event.target===this) window.closeModals()">
        <div class="app-modal-content text-white text-center">
            <div class="close-sheet-btn" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="cv-body"></div>
            <div class="flex gap-3 mt-8">
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl" onclick="window.switchTab(0); window.closeModals()"><i class="fa-solid fa-comment text-[#00a884] text-2xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl"><i class="fa-solid fa-phone text-blue-400 text-2xl"></i></button>
                <button class="flex-1 p-4 bg-[#202c33] rounded-2xl"><i class="fa-solid fa-envelope text-red-400 text-2xl"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-map" class="app-modal" onclick="if(event.target===this) window.closeModals()">
        <div class="app-modal-content h-[75vh]">
            <div class="close-sheet-btn" onclick="window.closeModals()"><i class="fa-solid fa-xmark"></i></div>
            <div id="map-target" class="w-full h-full rounded-2xl bg-black flex items-center justify-center text-[#8696a0] overflow-hidden">GPS LOADING...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40", authDomain: "hello-friends-p8p3i7.firebaseapp.com", databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "hello-friends-p8p3i7" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.myUid = localStorage.getItem('hf_uid_24') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hf_uid_24', window.myUid);
        window.myProf = JSON.parse(localStorage.getItem('hf_prof_24')) || { name: 'Guest', flag: '🌐', lang: 'en', photo: 'https://ui-avatars.com/api/?name=Guest&background=random' };
        window.users = [];

        // БЕЗОШИБОЧНАЯ НАВИГАЦИЯ
        window.switchTab = (idx) => {
            const screens = ['message', 'voice-translator', 'conference', 'profession', 'social'];
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(screens[idx]).classList.add('active');
            const navItems = document.querySelectorAll('.nav-item');
            if(navItems[idx]) navItems[idx].classList.add('active');
            window.closeDropdown();
        };

        // ЧАТ И АМЕРИКАНЕЦ
        window.sendMsg = () => {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            db.ref("global_fixed_24").push({ text: inp.value, name: window.myProf.name, uid: window.myUid, flag: window.myProf.flag, lang: window.myProf.lang, photo: window.myProf.photo });
            inp.value = '';
        };

        db.ref("global_fixed_24").on("child_added", async (snap) => {
            const d = snap.val(); const isMe = d.uid === window.myUid;
            
            if(!isMe && !window.users.find(u => u.uid === d.uid)) {
                window.users.push(d); window.drawSidebar();
            }

            const box = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = `flex gap-2 w-full mt-2 ${isMe ? 'justify-end' : 'justify-start'}`;
            row.innerHTML = `
                ${!isMe ? `<img src="${d.photo}" class="w-10 h-10 rounded-full self-end object-cover border border-[#202c33]" onclick="window.openCV('${d.uid}')">` : ''}
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe ? `<div class="text-[10px] font-bold text-[#00a884] ml-1 mb-1">${d.name}</div>` : ''}
                    <div class="chat-bubble ${isMe ? 'bg-[#005c4b]' : 'bg-[#202c33]'}">${d.text}</div>
                </div>
            `;
            box.appendChild(row);

            if(!isMe) {
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${window.myProf.lang}&dt=t&q=${encodeURIComponent(d.text)}`).then(r => r.json());
                    const trans = res[0][0][0];
                    const tDiv = document.createElement('div');
                    tDiv.className = `flex w-full mt-1 ${isMe ? 'justify-end' : 'justify-start pl-12'}`;
                    tDiv.innerHTML = `<div class="text-yellow-400 text-[11px] font-bold">${d.flag} ${trans}</div>`;
                    box.appendChild(tDiv);
                } catch(e){}
            }
            box.scrollTop = box.scrollHeight;
        });

        window.drawSidebar = () => {
            const side = document.getElementById('sidebar');
            side.innerHTML = '<div class="w-12 h-12 rounded-full bg-[#005c4b] flex items-center justify-center text-white border border-[#202c33]">🌍</div>';
            window.users.forEach(u => {
                side.innerHTML += `<div class="relative" onclick="window.openCV('${u.uid}')"><img src="${u.photo}" class="w-12 h-12 rounded-full object-cover border border-[#202c33]"><span class="absolute -bottom-1 -right-1 text-[10px] bg-black px-1 rounded-full">${u.flag}</span></div>`;
            });
        };

        // ЗАКРЫТИЕ ПО КЛИКУ
        window.closeDropdown = () => { document.getElementById('header-dropdown')?.classList.remove('active'); document.getElementById('rh-menu')?.classList.remove('active'); };
        window.toggleHeaderMenu = (e) => { e.stopPropagation(); document.getElementById('header-dropdown').classList.toggle('active'); };
        window.toggleRhombus = (e) => { e.stopPropagation(); document.getElementById('rh-menu').classList.toggle('active'); };
        document.body.addEventListener('click', () => { window.closeDropdown(); });

        window.closeModals = () => document.querySelectorAll('.app-modal').forEach(m => m.classList.remove('active'));
        window.openProfile = () => { document.getElementById('modal-identity').classList.add('active'); window.closeDropdown(); };
        
        window.openCV = (uid) => {
            const u = window.users.find(x => x.uid === uid) || (uid === window.myUid ? window.myProf : null);
            if(!u) return;
            document.getElementById('cv-body').innerHTML = `<img src="${u.photo}" class="w-24 h-24 rounded-full mx-auto mb-4 border-2 border-[#00a884] object-cover"><h3 class="text-2xl font-bold">${u.name}</h3><p class="text-gray-400 mt-2">Language: ${u.lang.toUpperCase()}</p>`;
            document.getElementById('modal-cv').classList.add('active');
        };

        window.openLocation = () => {
            document.getElementById('modal-map').classList.add('active'); window.closeDropdown();
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('map-target').innerHTML = `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}&z=15&output=embed" style="border:none;"></iframe>`;
            });
        };

        window.saveProfile = () => {
            const name = document.getElementById('p-name').value || 'User';
            const c = document.getElementById('p-country').value;
            const flags = { un: '🌐', az: '🇦🇿', ru: '🇷🇺', us: '🇺🇸' };
            const langs = { un: 'en', az: 'az', ru: 'ru', us: 'en' };
            window.myProf = { name: name, flag: flags[c], lang: langs[c], photo: window.tempImg || `https://ui-avatars.com/api/?name=${name}&background=random` };
            localStorage.setItem('hf_prof_24', JSON.stringify(window.myProf));
            window.closeModals(); location.reload();
        };

        window.doPreview = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { window.tempImg = ev.target.result; document.getElementById('p-img').src = ev.target.result; };
            reader.readAsDataURL(e.target.files[0]);
        };

        // STARTUP
        if(!localStorage.getItem('hf_prof_24')) window.openProfile();
        document.getElementById('v-me-img').src = window.myProf.photo;
        document.getElementById('p-img').src = window.myProf.photo;
        document.getElementById('p-name').value = window.myProf.name;
    </script>
</body>
</html>
