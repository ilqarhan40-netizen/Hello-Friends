<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Hello Friends - Super App</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script> (function(){ emailjs.init("1jQAeZgeFaV2cvrR8"); })(); </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Allura&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { background-color: #1a1e23; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .mobile-screen { width: 100%; max-width: 400px; height: 85vh; max-height: 800px; background: linear-gradient(180deg, #3a3d42 0%, #2a2d32 100%); border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #4a4e53; display: flex; flex-direction: column; padding: 20px 20px 0 20px; color: #c0c5d0; overflow: hidden; position: relative; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 0.5rem; z-index: 50; }
        .logo-circle { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(145deg, #a29bfe, #6c5ce7); display: flex; justify-content: center; align-items: center; font-weight: 700; color: white; }
        .header-icons button { color: #888; padding: 5px; transition: 0.3s; }
        .header-icons button:hover { color: #a29bfe; }
        
        .header-dropdown { position: absolute; top: 60px; right: 20px; width: 220px; background: #2a2d32; border: 1px solid #4a4e53; border-radius: 12px; padding: 10px; display: none; flex-direction: column; z-index: 100; }
        .header-dropdown.active { display: flex; }
        .header-dropdown a { color: #c0c5d0; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: sans-serif; font-size: 0.85rem; }
        .header-dropdown a:hover { background: #3a3d42; color: white; }
        
        .nav-link { white-space: nowrap; padding: 5px 10px; font-size: 0.7rem; color: #888; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: #fff; font-weight: 700; text-shadow: 0 0 5px #a29bfe; }
        
        .page-content { display: none; flex-grow: 1; flex-direction: column; overflow: hidden; animation: fadeIn 0.3s; }
        .page-content.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .chat-sidebar { width: 70px; border-right: 1px solid #4a4e53; overflow-y: auto; padding-top: 10px; }
        .chat-contact-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #555; margin: 0 auto 15px; cursor: pointer; background-size: cover; background-position: center; }
        .active-room { border-color: #4ade80 !important; box-shadow: 0 0 10px #4ade8055; }

        .chat-bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.85rem; font-family: sans-serif; max-width: 85%; margin-top: 5px; line-height: 1.4; }
        .incoming { background: #3a3d42; color: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .outgoing { background: linear-gradient(145deg, #6c5ce7, #a29bfe); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .app-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; border-radius: 30px; backdrop-filter: blur(5px); }
        .app-modal.active { display: flex; }
        .modal-content { background: #2a2d32; padding: 20px; border-radius: 20px; width: 90%; border: 1px solid #4a4e53; }

        .form-input { width: 100%; padding: 10px; border-radius: 8px; background: #1a1e23; border: 1px solid #4a4e53; color: white; font-family: sans-serif; margin-bottom: 10px; outline: none; }
        .form-btn { width: 100%; padding: 12px; border-radius: 10px; background: linear-gradient(145deg, #a29bfe, #6c5ce7); color: white; font-weight: 700; cursor: pointer; }
        
        .rhombus-btn { width: 50px; height: 50px; background: #6c5ce7; transform: rotate(45deg); border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .rhombus-btn i { transform: rotate(-45deg); color: white; font-size: 1.2rem; }

        .conf-listener-marquee { font-size: 0.65rem; color: #00C4CC; font-weight: bold; white-space: nowrap; overflow: hidden; }
        .toast { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: #2a2d32; border: 1px solid #a29bfe; padding: 10px; border-radius: 15px; display: none; z-index: 2000; width: 80%; }
    </style>
</head>
<body>

    <div class="mobile-screen" id="app-body">
        <div id="toast" class="toast flex items-center gap-3">
            <div id="toast-icon" class="text-2xl">🌍</div>
            <div class="flex flex-col">
                <span id="toast-name" class="font-bold text-white text-sm">System</span>
                <span id="toast-msg" class="text-xs text-gray-400">Welcome back!</span>
            </div>
        </div>

        <header class="app-header">
            <div class="logo-circle">HF</div>
            <div class="header-icons">
                <button onclick="openModal('search-modal')"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button onclick="openModal('email-modal')"><i class="fa-regular fa-envelope"></i></button>
                <button onclick="document.getElementById('drop').classList.toggle('active')"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div id="drop" class="header-dropdown">
                <a onclick="openCV()"><i class="fa-solid fa-user"></i> My CV / Profile</a>
                <a onclick="openModal('auth-modal')"><i class="fa-solid fa-shield-halved"></i> Authentication</a>
                <a onclick="openModal('transfer-modal')"><i class="fa-solid fa-money-bill-transfer text-green-400"></i> Transfer</a>
                <a onclick="location.reload()" style="color:#ef4444"><i class="fa-solid fa-power-off"></i> Logout</a>
            </div>
        </header>

        <nav class="flex justify-between border-b border-[#4a4e53] mb-2">
            <a class="nav-link active" onclick="tab(0)">Chat</a>
            <a class="nav-link" onclick="tab(1)">Voice</a>
            <a class="nav-link" onclick="tab(2)">Conference</a>
            <a class="nav-link" onclick="tab(3)">Profession</a>
            <a class="nav-link" onclick="tab(4)">Archive</a>
        </nav>

        <main class="flex-grow flex flex-col overflow-hidden">
            <div id="p0" class="page-content active h-full flex-row flex">
                <div class="chat-sidebar" id="sidebar"></div>
                <div class="flex-grow flex flex-col p-2">
                    <div id="chat-header" class="border-b border-[#4a4e53] pb-1 mb-2 text-xs font-bold text-[#a29bfe]">Global Chat</div>
                    <div id="chat-msgs" class="flex-grow overflow-y-auto flex flex-col gap-2"></div>
                    <div class="flex gap-2 pt-2 border-t border-[#4a4e53]">
                        <input id="chat-inp" type="text" class="form-input mb-0" placeholder="Type...">
                        <button onclick="sendMsg('chat-inp')" class="bg-[#6c5ce7] text-white px-3 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="p1" class="page-content p-4 text-center">
                <h2 style="font-family: 'Allura', cursive; font-size: 3rem; color: #a29bfe;">Voice</h2>
                <div class="flex justify-center gap-10 my-10">
                    <div class="flex flex-col items-center">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" class="w-20 h-20 rounded-full border-2 border-gray-500">
                        <span class="text-xs mt-2">Marinella 🇮🇹</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-20 h-20 rounded-full bg-indigo-600 flex items-center justify-center text-3xl border-4 border-[#a29bfe]">👤</div>
                        <span id="my-voice-name" class="text-xs mt-2">You</span>
                    </div>
                </div>
                <div id="voice-subs" class="bg-black/40 p-3 rounded-xl text-green-400 text-sm font-bold min-h-[40px] flex items-center justify-center">Waiting for speech...</div>
                <div class="mt-auto flex gap-2 pt-4">
                    <input id="voice-inp" type="text" class="form-input mb-0" placeholder="Speak...">
                    <button onclick="sendMsg('voice-inp')" class="bg-[#a29bfe] text-white px-4 rounded-lg">Send</button>
                </div>
            </div>

            <div id="p2" class="page-content h-full bg-black">
                <div class="grid grid-cols-2 gap-1 p-1" id="conf-grid"></div>
                <div id="conf-chat" class="flex-grow overflow-y-auto p-2 text-[0.6rem] font-sans"></div>
                <div class="flex p-2 gap-1">
                    <input id="conf-inp" type="text" class="form-input mb-0 text-xs" placeholder="Message...">
                    <button onclick="sendMsg('conf-inp')" class="bg-teal-500 text-black px-3 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="p3" class="page-content p-2">
                <h2 class="text-center mb-4">Professionals</h2>
                <div id="prof-list" class="grid grid-cols-2 gap-3 overflow-y-auto"></div>
            </div>

            <div id="p4" class="page-content p-2 overflow-y-auto" id="arc-list">
                <h2 class="text-center mb-4">Transaction History</h2>
                <div id="arc-items"></div>
            </div>
        </main>

        <div class="flex justify-center p-4 bg-[#2a2d32] border-t border-[#4a4e53]">
            <div class="rhombus-btn" onclick="openModal('auth-modal')"><i class="fa-solid fa-plus"></i></div>
        </div>
    </div>

    <div id="auth-modal" class="app-modal">
        <div class="modal-content text-center">
            <h2 class="mb-4">Authentication</h2>
            <input id="auth-email" class="form-input" placeholder="Email">
            <input id="auth-pass" type="password" class="form-input" placeholder="Password (6+ chars)">
            <button onclick="handleAuth()" class="form-btn">Login / Register</button>
            <button onclick="closeModals()" class="mt-4 text-xs text-gray-500 underline">Close</button>
        </div>
    </div>

    <div id="cv-modal" class="app-modal">
        <div class="modal-content">
            <h2 class="mb-4 text-center">Update Your CV</h2>
            <input id="cv-name" class="form-input" placeholder="Full Name">
            <input id="cv-job" class="form-input" placeholder="Profession">
            <input id="cv-lang" class="form-input" placeholder="Languages">
            <textarea id="cv-about" class="form-input" placeholder="Bio / Experience"></textarea>
            <button onclick="saveCV()" class="form-btn">Save to Cloud</button>
        </div>
    </div>

    <div id="transfer-modal" class="app-modal">
        <div class="modal-content">
            <h2 class="mb-4">Send Money</h2>
            <input id="tr-amount" type="number" class="form-input" placeholder="Amount USD">
            <button onclick="doTransfer()" class="form-btn bg-green-600">Send $0.01 Fee</button>
            <button onclick="closeModals()" class="mt-4 block mx-auto">Cancel</button>
        </div>
    </div>

    <div id="email-modal" class="app-modal">
        <div class="modal-content">
            <h2>New Email</h2>
            <input id="em-to" class="form-input" placeholder="To: email@example.com">
            <input id="em-sub" class="form-input" placeholder="Subject">
            <textarea id="em-msg" class="form-input" rows="3"></textarea>
            <button onclick="sendEmail()" class="form-btn">Send via EmailJS</button>
        </div>
    </div>

    <script>
        // 1. CONFIG & INIT
        const firebaseConfig = {
            apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40",
            authDomain: "hello-friends-p8p3i7.firebaseapp.com",
            databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hello-friends-p8p3i7",
            storageBucket: "hello-friends-p8p3i7.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let user = null;
        let currentRoom = "global_chat";
        let participants = [
            { id: 'klaus', name: 'Klaus Müller', job: 'Engineer', photo: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100', flag: '🇩🇪', email: 'klaus@test.de', lang: 'de' },
            { id: 'marinella', name: 'Marinella', job: 'Marketing', photo: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100', flag: '🇮🇹', email: 'mari@test.it', lang: 'it' }
        ];

        // 2. AUTH LOGIC
        function handleAuth() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            auth.signInWithEmailAndPassword(e, p)
                .then(() => { alert("Welcome back!"); closeModals(); })
                .catch(() => {
                    auth.createUserWithEmailAndPassword(e, p)
                        .then(() => { alert("Registered!"); openModal('cv-modal'); })
                        .catch(err => alert(err.message));
                });
        }

        auth.onAuthStateChanged(u => {
            if (u) {
                user = u;
                document.getElementById('my-voice-name').innerText = u.email.split('@')[0];
                renderProfession();
                loadSidebar();
                switchRoom('global');
            }
        });

        // 3. CV LOGIC
        function saveCV() {
            if (!user) return;
            const data = {
                name: document.getElementById('cv-name').value,
                job: document.getElementById('cv-job').value,
                lang: document.getElementById('cv-lang').value,
                about: document.getElementById('cv-about').value,
                photo: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
                email: user.email,
                uid: user.uid
            };
            db.ref('users/' + user.uid).set(data).then(() => {
                alert("CV Updated!");
                closeModals();
                renderProfession();
            });
        }

        function renderProfession() {
            const list = document.getElementById('prof-list');
            list.innerHTML = '';
            // Демо-юзеры
            participants.forEach(p => {
                list.innerHTML += `<div class="bg-[#333] p-3 rounded-xl text-center">
                    <img src="${p.photo}" class="w-12 h-12 rounded-full mx-auto mb-2">
                    <div class="text-[0.7rem] font-bold">${p.name}</div>
                    <div class="text-[0.6rem] text-gray-400">${p.job}</div>
                    <button onclick="switchRoom('${p.id}')" class="text-[0.6rem] text-blue-400 mt-2">Chat</button>
                </div>`;
            });
            // Реальные юзеры из базы
            db.ref('users').once('value', snap => {
                snap.forEach(child => {
                    const u = child.val();
                    if(u.uid === user.uid) return;
                    list.innerHTML += `<div class="bg-[#333] p-3 rounded-xl text-center">
                        <img src="${u.photo}" class="w-12 h-12 rounded-full mx-auto mb-2">
                        <div class="text-[0.7rem] font-bold">${u.name}</div>
                        <div class="text-[0.6rem] text-gray-400">${u.job}</div>
                        <button onclick="switchRoom('${u.uid}')" class="text-[0.6rem] text-blue-400 mt-2">Chat</button>
                    </div>`;
                });
            });
        }

        // 4. CHAT & AI LOGIC
        function sendMsg(id) {
            const inp = document.getElementById(id);
            const txt = inp.value.trim();
            if (!txt || !user) return;

            // VOICE Tab
            if (id === 'voice-inp') {
                const box = document.getElementById('voice-subs');
                fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=it&dt=t&q=${encodeURIComponent(txt)}`)
                .then(r => r.json()).then(d => {
                    box.innerHTML = `${txt} <br> <span class="text-yellow-400">🇮🇹 ${d[0][0][0]}</span>`;
                });
            } 
            // CONF Tab
            else if (id === 'conf-inp') {
                const chat = document.getElementById('conf-chat');
                chat.innerHTML += `<div class="text-white mb-1"><b>You:</b> ${txt}</div>`;
            } 
            // MAIN Tab
            else {
                db.ref(currentRoom).push({ name: user.email.split('@')[0], text: txt, uid: user.uid, time: Date.now() });
                
                if (currentRoom === 'private_ai') {
                    const aiRef = db.ref(currentRoom).push({ name: "AI Bot", text: "⏳ Thinking..." });
                    const key = "AIzaSyA1AMNmfGv_D4Qaneg1XiZUbw8juesycHg";
                    fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                    })
                    .then(r => r.json())
                    .then(data => {
                        const reply = data.candidates[0].content.parts[0].text;
                        aiRef.update({ text: reply });
                    })
                    .catch(() => aiRef.update({ text: "I'm currently busy, but Hello Friends is great!" }));
                }
            }
            inp.value = '';
        }

        function switchRoom(id) {
            currentRoom = id === 'global' ? 'global_chat' : (id === 'ai' ? 'private_ai' : 'private_' + [user.uid, id].sort().join('_'));
            document.getElementById('chat-header').innerText = id.toUpperCase();
            document.getElementById('chat-msgs').innerHTML = '';
            db.ref(currentRoom).off();
            db.ref(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const side = m.name === user.email.split('@')[0] ? 'outgoing' : 'incoming';
                document.getElementById('chat-msgs').innerHTML += `<div class="chat-bubble ${side}">${m.text}</div>`;
                document.getElementById('chat-msgs').scrollTop = 9999;
            });
            tab(0);
        }

        // 5. BANKING
        function doTransfer() {
            const amt = document.getElementById('tr-amount').value;
            const txn = 'TXN-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            const msg = `💳 [BANK TRANSFER] $${amt} sent. ID: ${txn} ✅`;
            db.ref(currentRoom).push({ name: "System", text: msg, time: Date.now() });
            
            const card = `<div class="bg-gray-800 p-3 rounded-lg mb-2 border-l-4 border-green-500">
                <div class="text-[0.6rem] text-gray-500">${new Date().toLocaleString()}</div>
                <div class="font-bold text-green-400">$${amt} Sent</div>
                <div class="text-[0.5rem] text-white">ID: ${txn}</div>
            </div>`;
            document.getElementById('arc-items').innerHTML += card;
            alert("Success! Check Archive.");
            closeModals();
        }

        // 6. UI HELPERS
        function tab(i) {
            document.querySelectorAll('.nav-link').forEach((l, idx) => {
                l.classList.toggle('active', idx === i);
                document.getElementById('p'+idx).classList.toggle('active', idx === i);
            });
            if(i === 2) initConf();
        }

        function initConf() {
            const grid = document.getElementById('conf-grid');
            grid.innerHTML = `<div class="relative bg-gray-900 aspect-video rounded overflow-hidden">
                <video autoplay loop muted class="w-full h-full object-cover" src="https://assets.mixkit.co/videos/preview/mixkit-businessman-having-a-video-call-with-his-team-41209-large.mp4"></video>
                <div class="absolute bottom-1 left-1 text-[0.5rem] bg-black/50 p-1">You</div>
            </div>`;
            participants.forEach(p => {
                grid.innerHTML += `<div class="relative bg-gray-900 aspect-video rounded overflow-hidden">
                <div class="absolute inset-0 flex items-center justify-center text-xs opacity-20">${p.name}</div>
                <div class="absolute bottom-1 left-1 text-[0.5rem] bg-black/50 p-1">${p.name}</div>
                <div class="absolute bottom-0 w-full bg-black/70 text-[0.5rem] text-teal-400 p-1 conf-listener-marquee">➔ Ready...</div>
            </div>`;
            });
        }

        function loadSidebar() {
            const s = document.getElementById('sidebar');
            s.innerHTML = `<div class="chat-contact-icon flex items-center justify-center bg-blue-600 text-white" onclick="switchRoom('global')">🌍</div>`;
            s.innerHTML += `<div class="chat-contact-icon flex items-center justify-center bg-purple-600 text-white" onclick="switchRoom('ai')">🤖</div>`;
            participants.forEach(p => {
                s.innerHTML += `<div class="chat-contact-icon" style="background-image:url(${p.photo})" onclick="switchRoom('${p.id}')"></div>`;
            });
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.app-modal').forEach(m => m.classList.remove('active')); }
        function openCV() { openModal('cv-modal'); }

        function sendEmail() {
            const params = { to_email: document.getElementById('em-to').value, message: document.getElementById('em-msg').value };
            emailjs.send("service_i4o7lfa", "template_lrcjrkr", params).then(() => {
                alert("Email Sent!"); closeModals();
            });
        }
    </script>
</body>
</html>
