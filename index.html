    <style>

        @media (max-width: 500px) { .mobile-screen { max-width: 100%; height: 100dvh; max-height: 100dvh; border-radius: 0; border: none; } }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--wa-panel); border-bottom: 1px solid var(--wa-border); z-index: 50; flex-shrink: 0; }

        .header-title { font-size: 1.1rem; font-weight: bold; color: var(--wa-text); }

        .header-dropdown { position: absolute; top: 60px; right: 10px; width: 230px; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 14px 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); display: none; flex-direction: column; gap: 4px; z-index: 100; transform-origin: top right; animation: scaleIn 0.2s; }
        .header-dropdown.active { display: flex; }
        .header-dropdown a { color: var(--wa-text); font-size: 0.9rem; padding: 10px 8px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .header-dropdown a:hover { background: var(--wa-border); }

        .page-content.active { display: flex !important; }
        .page-container { width: 100%; height: 100%; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; }
        .chat-sidebar { width: 75px; flex-shrink: 0; border-right: 1px solid var(--wa-border); overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 12px; background: var(--wa-panel); }

        .outgoing .chat-bubble { background: var(--wa-msg-out); color: white; border-bottom-right-radius: 4px; }

        .mic-btn-chat { width: 40px; height: 40px; border-radius: 50%; background: var(--wa-border); color: var(--wa-text-muted); border: none; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--wa-green); color: #111b21; border: none; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .bottom-nav-container { display: flex; justify-content: space-between; align-items: center; background: var(--wa-panel); border-top: 1px solid var(--wa-border); padding: 8px 10px 16px 10px; flex-shrink: 0; position: relative; z-index: 50; width: 100%; }
        .nav-links-wrapper { display: flex; justify-content: space-around; flex-grow: 1; padding-right: 10px; }
        .nav-item { color: var(--wa-text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: color 0.3s; flex: 1; }
        .nav-item i { font-size: 1.3rem; transition: transform 0.2s; }
        .nav-item.active { color: var(--wa-green); }
        .rhombus-wrapper { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
        .rhombus-btn { width: 100%; height: 100%; background: linear-gradient(135deg, #a29bfe, #6c5ce7); border-radius: 12px; transform: rotate(45deg); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(162, 155, 254, 0.4); transition: transform 0.3s; }
        .rhombus-btn.active { transform: rotate(180deg); }
        .rhombus-btn i { transform: rotate(-45deg); color: white; font-size: 1.2rem; }
        .rhombus-menu { position: absolute; bottom: 65px; right: 0; background: var(--wa-panel); border: 1px solid var(--wa-border); border-radius: 16px; padding: 12px; display: none; grid-template-columns: repeat(3, 1fr); gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); z-index: 100; }
        .rhombus-menu.active { display: grid; animation: scaleIn 0.2s;}
        .action-icon { width: 44px; height: 44px; background-color: var(--wa-border); color: var(--wa-text); border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; font-size: 1.1rem;}
        .app-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: flex-end; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
        .app-modal.active { display: flex !important; animation: fadeInBg 0.3s; }
        .app-modal-content { background: var(--wa-panel); width: 100%; max-width: 400px; border-radius: 32px 32px 0 0; padding: 24px; position: relative; display: flex; flex-direction: column; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .app-modal.active .app-modal-content { transform: translateY(0); }
        .form-input-box { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--wa-border); background: var(--wa-bg); color: white; font-size: 0.95rem; outline: none; margin-bottom: 12px; }
        .btn-primary { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--wa-green); color: #111b21; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .video-frame { position: relative; border-radius: 16px; padding-top: 100%; overflow: hidden; background: #000; border: 1px solid var(--wa-border); }
        .video-frame.main { grid-column: 1 / 3; padding-top: 60%; border: 2px solid var(--wa-green); }
        .video-frame video, .video-frame .placeholder-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; bottom: 25px; left: 8px; background: rgba(0,0,0,0.7); color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 8px; font-weight: bold; z-index: 10;}
        .translation-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 4px 6px; overflow: hidden; display: flex; align-items: center; z-index: 20; border-top: 1px solid rgba(255,255,255,0.1); }
        .conf-marquee-text { display: inline-block; padding-left: 100%; animation: scroll-text 8s linear infinite; font-size: 0.75rem; color: var(--wa-green); font-weight: bold; white-space: nowrap; }
        
        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        #universal-mic-popup { position: absolute; bottom: 65px; right: 10px; background: #111b21; border: 1px solid #2a3942; border-radius: 20px; padding: 6px; display: none; flex-direction: column; gap: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); z-index: 9999; }
        #universal-mic-popup.active { display: flex; }
        .mic-option-btn { background: #202c33; color: white; border: none; padding: 12px 16px; border-radius: 14px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; width: 220px; }
        .ai-audio-player { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        .ai-audio-player i { color: var(--wa-green); font-size: 1.2rem; }
    </style>

<body>

    <div id="security-lock" style="position: fixed; inset: 0; background: #0b141a; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div id="auth-spinner">
            <i class="fa-solid fa-circle-notch fa-spin text-[#00a884] text-5xl mb-6"></i>
            <h2 style="color: white; font-family: 'Orbitron', sans-serif;">HELLO FRIENDS</h2>
        </div>
        <div id="auth-login-box" style="display: none; flex-direction: column; align-items: center;">
            <button onclick="window.signInWithGoogle()" style="background: white; color: #757575; padding: 14px 30px; border-radius: 8px; font-weight: 700; display: flex; align-items: center; gap: 12px; border: none;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width: 22px;"> Sign in with Google
            </button>
        </div>
    </div>

    <div class="mobile-screen" id="phone-body">
        <header class="app-header">
            <div class="logo-container"><div class="logo-circle">HF</div><span class="header-title">Hello Friends</span></div>
            <div class="header-icons"><i class="fa-solid fa-magnifying-glass"></i><i class="fa-solid fa-ellipsis-vertical" onclick="window.toggleHeaderMenu(event)"></i></div>
            <div id="header-dropdown" class="header-dropdown">
                <a onclick="window.openMyProfile()"><i class="fa-solid fa-user"></i> Profile</a>
                <a onclick="window.signOutGoogle()"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
            </div>
        </header>

        <main class="flex-grow overflow-hidden flex flex-col relative">
            <div id="message" class="page-content active h-full flex flex-col">
                <div class="flex h-full overflow-hidden w-full">
                    <div class="chat-sidebar" id="chat-sidebar"></div>
                    <div class="flex flex-col flex-grow h-full overflow-hidden">
                        <div class="chat-messages" id="chat-messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input" placeholder="Message..." class="bg-[#202c33] border-none text-white w-full outline-none rounded-full px-4 py-2">
                            <button class="send-btn" onclick="window.currentMicInputTarget='chat-input'; window.sendFirebaseMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="voice-translator" class="page-content h-full flex flex-col bg-[#0b141a]">
                <div class="chat-info-marquee-container"><span class="chat-info-marquee-text" id="voice-info-marquee">Waiting for voice...</span></div>
                <div class="flex-grow flex flex-col justify-center items-center">
                    <div class="w-32 h-32 rounded-full border-4 border-[#00a884] overflow-hidden mb-4"><img id="voice-me-photo" src="" class="w-full h-full object-cover"></div>
                    <h3 id="voice-me-name" class="text-white font-bold"></h3>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="voice-chat-input" placeholder="Voice Chat..." class="bg-[#202c33] border-none text-white w-full outline-none rounded-full px-4 py-2">
                    <button class="send-btn" onclick="window.currentMicInputTarget='voice-chat-input'; window.sendFirebaseMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="conference" class="page-content h-full flex flex-col bg-[#000]">
                <div class="flex-grow overflow-y-auto p-2"><div class="video-grid" id="conference-grid"></div></div>
                <div class="chat-input-area">
                    <input type="text" id="conf-chat-input" placeholder="Conf Chat..." class="bg-[#202c33] border-none text-white w-full outline-none rounded-full px-4 py-2">
                    <button class="send-btn" onclick="window.currentMicInputTarget='conf-chat-input'; window.sendFirebaseMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <div class="bottom-nav-container">
            <div class="nav-links-wrapper">
                <a class="nav-item active" onclick="window.switchTab(0)"><i class="fa-solid fa-message"></i><span>Chat</span></a>
                <a class="nav-item" onclick="window.switchTab(1)"><i class="fa-solid fa-microphone-lines"></i><span>Voice</span></a>
                <a class="nav-item" onclick="window.switchTab(2)"><i class="fa-solid fa-video"></i><span>Meet</span></a>
            </div>
            <div class="rhombus-wrapper"><div class="rhombus-btn" onclick="window.toggleRhombusMenu(event)"><i class="fa-solid fa-plus"></i></div></div>
        </div>
    </div>

    <script>
        // AUTH & FIREBASE INIT
        firebase.auth().onAuthStateChanged((user) => {
            const lock = document.getElementById('security-lock');
            if (user) {
                lock.style.display = 'none';
                window.myProfileInfo = { id: user.uid, name: user.displayName || 'User', photo: user.photoURL || 'https://ui-avatars.com/api/?name=U', flag: '🌐', flagCode: 'un', langCode: 'en' };
                window.myUsername = window.myProfileInfo.name;
                db.ref('users/' + user.uid).update(window.myProfileInfo);
                initApp();
            } else {
                document.getElementById('auth-spinner').style.display = 'none';
                document.getElementById('auth-login-box').style.display = 'flex';
            }
        });

        window.signInWithGoogle = () => { const provider = new firebase.auth.GoogleAuthProvider(); firebase.auth().signInWithPopup(provider); };
        window.signOutGoogle = () => { firebase.auth().signOut().then(() => location.reload()); };

        function initApp() {
            window.currentRoomId = "global";
            window.mySessionId = Math.random().toString(36).substring(7);
            window.participants = [];
            
            db.ref('users').on('value', snap => {
                const data = snap.val();
                if (data) window.participants = Object.values(data);
                renderSidebar();
                if (window.currentIndex === 2) initConference();
            });

            window.switchChatRoom('global');
        }

        // NAVIGATION
        window.currentIndex = 0;
        window.switchTab = (idx) => {
            window.currentIndex = idx;
            document.querySelectorAll('.page-content').forEach((p, i) => p.classList.toggle('active', i === idx));
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            if (idx === 2) initConference();
            if (idx === 1) {
                document.getElementById('voice-me-photo').src = window.myProfileInfo.photo;
                document.getElementById('voice-me-name').innerText = window.myUsername;
            }
        };

        // CHAT LOGIC
        function renderSidebar() {
            const side = document.getElementById('chat-sidebar');
            side.innerHTML = `<div class="chat-contact" onclick="window.switchChatRoom('global')"><div class="chat-contact-icon bg-[#005c4b] text-white flex items-center justify-center">🌍</div><span class="chat-contact-name">Global</span></div>`;
        }

        window.switchChatRoom = (rid) => {
            if (window.activeListener) db.ref(window.currentRoomId).off('child_added', window.activeListener);
            document.getElementById('chat-messages').innerHTML = '';
            window.currentRoomId = rid;
            window.activeListener = db.ref(rid).on('child_added', handleNewMessage);
        };

        window.sendFirebaseMsg = async () => {
            const input = document.getElementById(window.currentMicInputTarget || 'chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            const isVoice = window.currentMicInputTarget === 'voice-chat-input';
            const isConf = window.currentMicInputTarget === 'conf-chat-input';
            
            db.ref(window.currentRoomId).push({
                userId: window.myProfileInfo.id,
                name: window.myUsername,
                text: text,
                originalText: text,
                sessionId: window.mySessionId,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                photo: window.myProfileInfo.photo,
                flag: window.myProfileInfo.flag,
                langCode: window.myProfileInfo.langCode,
                isVoiceRoomMsg: isVoice,
                isConfMsg: isConf
            });
        };

        async function handleNewMessage(snapshot) {
            const data = snapshot.val(); if(!data) return;
            const chatMessages = document.getElementById('chat-messages');
            const isMe = data.sessionId === window.mySessionId || data.userId === window.myProfileInfo.id;
            const isAI = data.userId === "ai";
            let p = isMe ? window.myProfileInfo : (window.participants.find(u => u.id === data.userId) || data);
            let senderDisplayName = isMe ? "Me" : (data.name || 'User').split(' ')[0];

            // 1. ВИДЕО-КОНФЕРЕНЦИЯ (MEET) - ТВОЯ ЛОГИКА
            if (data.isConfMsg) {
                if (window.currentIndex === 2) {
                    let myReadLang = localStorage.getItem('hf_personal_lang') || window.myProfileInfo.langCode || 'en';
                    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${myReadLang}&dt=t&q=${encodeURIComponent(data.originalText || data.text)}`)
                    .then(r => r.json()).then(resData => {
                        let translated = resData[0][0][0];
                        let targetMarquee = isMe ? document.getElementById('speaker-marquee') : document.getElementById(`conf-marquee-${data.userId}`);
                        if (targetMarquee) {
                            targetMarquee.innerHTML = `<span class="text-white">${senderDisplayName}:</span> <span class="text-[#00a884] font-bold">${p.flag || '🌐'} ${translated}</span>`;
                            targetMarquee.style.animation = 'none'; void targetMarquee.offsetWidth; targetMarquee.style.animation = null;
                        }
                    });
                }
                return; // Заглушка
            }

            // 2. ГОЛОСОВАЯ КОМНАТА
            if (data.isVoiceRoomMsg) {
                if (window.currentIndex === 1) {
                    let myReadLang = localStorage.getItem('hf_personal_lang') || window.myProfileInfo.langCode || 'en';
                    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${myReadLang}&dt=t&q=${encodeURIComponent(data.originalText || data.text)}`)
                    .then(r => r.json()).then(resData => {
                        const vMarquee = document.getElementById('voice-info-marquee');
                        if (vMarquee) vMarquee.innerHTML = `<span class="text-white">${senderDisplayName}:</span> <span class="text-[#00a884] font-bold">${p.flag || '🌐'} ${resData[0][0][0]}</span>`;
                    });
                }
                return; // Заглушка
            }

            // 3. ОБЫЧНЫЙ ЧАТ
            const messageGroup = document.createElement('div'); messageGroup.className = "flex flex-col w-full mt-2";
            const msgWrapper = document.createElement('div'); msgWrapper.className = `flex gap-2 w-full ${isMe ? 'justify-end' : 'justify-start'}`;
            let avatarHtml = `<img src="${p.photo}" class="w-8 h-8 rounded-full">`;
            let bubbleHtml = `<div class="chat-bubble ${isMe ? 'outgoing' : 'incoming'}">${data.text}</div>`;
            
            msgWrapper.innerHTML = isMe ? bubbleHtml + avatarHtml : avatarHtml + bubbleHtml;
            messageGroup.appendChild(msgWrapper);
            chatMessages.appendChild(messageGroup);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            if (!isMe && data.langCode !== (localStorage.getItem('hf_personal_lang') || window.myProfileInfo.langCode)) {
                let tl = localStorage.getItem('hf_personal_lang') || window.myProfileInfo.langCode;
                fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${tl}&dt=t&q=${encodeURIComponent(data.text)}`)
                .then(r => r.json()).then(resData => {
                    const tDiv = document.createElement('div'); tDiv.className = "text-yellow-400 text-xs mt-1 ml-10 font-bold";
                    tDiv.innerText = resData[0][0][0]; messageGroup.appendChild(tDiv);
                });
            }
        }

        // CONFERENCE INIT
        function initConference() {
            const grid = document.getElementById('conference-grid');
            let html = `<div class="video-frame main"><video id="my-video" autoplay muted loop class="w-full h-full object-cover"></video><div class="video-overlay">Me</div><div class="translation-bar"><div id="speaker-marquee" class="conf-marquee-text">Waiting...</div></div></div>`;
            window.participants.slice(0, 4).forEach(u => {
                if (u.id === window.myProfileInfo.id) return;
                html += `<div class="video-frame"><div class="absolute inset-0 bg-[#111b21]"></div><div class="video-overlay">${u.name}</div><div class="translation-bar"><div id="conf-marquee-${u.id}" class="conf-marquee-text">${u.flag} Listening...</div></div></div>`;
            });
            grid.innerHTML = html;
            const v = document.getElementById('my-video');
            v.src = 'https://assets.mixkit.co/videos/preview/mixkit-young-man-having-a-video-call-with-his-friends-41212-large.mp4';
        }

        window.toggleHeaderMenu = (e) => { e.stopPropagation(); document.getElementById('header-dropdown').classList.toggle('active'); };
        document.body.addEventListener('click', () => { document.getElementById('header-dropdown').classList.remove('active'); });
    </script>
</body>
</html>
