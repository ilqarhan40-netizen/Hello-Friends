<script>
        // === ГЛОБАЛЬНЫЕ ФУНКЦИИ ЗАКРЫТИЯ ===
        window.closeAvatarModal = function() { document.getElementById('avatar-modal').classList.remove('active'); };
        window.closeProfileModal = function() { document.getElementById('edit-profile-modal').classList.remove('active'); };
        window.closeSearchModal = function() { document.getElementById('search-modal').classList.remove('active'); if(window.resetGlobalSearch) window.resetGlobalSearch(); };
        window.closeBankTransferModal = function() { document.getElementById('transfer-modal').classList.remove('active'); };
        window.closeTrashModal = function() { document.getElementById('trash-modal').classList.remove('active'); };
        window.closePhoneChoiceModal = function() { document.getElementById('phone-choice-modal').classList.remove('active'); };
        window.closeEmailModal = function() { document.getElementById('email-modal').classList.remove('active'); };
        window.closeLocationModal = function() { document.getElementById('location-modal').classList.remove('active'); };

        window.toggleRhombusMenu = function(e) { 
            e.stopPropagation(); 
            const actions = document.getElementById('rhombus-actions');
            const btn = document.getElementById('rhombus-btn');
            if(actions.classList.contains('active')) {
                actions.classList.remove('active'); btn.classList.remove('active');
            } else {
                actions.classList.add('active'); btn.classList.add('active');
            }
        }
        
        window.closeDropdown = function() { 
            document.getElementById('header-dropdown')?.classList.remove('active'); 
            document.getElementById('rhombus-actions')?.classList.remove('active'); 
            document.getElementById('rhombus-btn')?.classList.remove('active');
        }
        
        window.toggleHeaderMenu = function(e) { e.stopPropagation(); document.getElementById('header-dropdown')?.classList.toggle('active'); }
        document.body.addEventListener('click', () => { window.closeDropdown(); });

        window.openPhoneChoiceModal = function() { window.closeDropdown(); document.getElementById('phone-choice-modal').classList.add('active'); };
        window.startInAppCall = function() { window.closePhoneChoiceModal(); window.switchTab(1); };
        window.startExternalCall = function() { 
            window.closePhoneChoiceModal(); 
            let targetId = window.currentRoomId.replace('private_', '').split('_').find(id => id !== window.myProfileInfo.id);
            if (targetId && targetId !== 'global' && targetId !== 'ai') {
                 let p = window.participants.find(part => part.id === targetId);
                 if (p && p.phone) { window.location.href = `tel:${p.phone.replace(/\s+/g, '')}`; return; }
            }
            alert('Open a user profile or private chat to make a cellular call.');
        };

        window.openEmailModal = function() { window.closeDropdown(); document.getElementById('email-modal').classList.add('active'); };
        window.openDirectEmail = function(email) { window.openEmailModal(); if(email) document.getElementById('email-to').value = email; };
        window.sendEmailForm = function(e) { e.preventDefault(); alert("Email sent successfully!"); window.closeEmailModal(); }

        // === ИНИЦИАЛИЗАЦИЯ И ЛОГИКА ===
        document.addEventListener('DOMContentLoaded', () => {

            const i18n = {
                en: { menu: "Settings", chat: "Chat", voice: "Voice", meet: "Meet", cv: "CV", social: "Social", profile: "My Profile", wallet: "Wallet", theme: "Theme", export: "Export Data", import: "Import Data", logout: "Log Out", lang: "Lang: EN", reg_title: "Welcome to Hello Friends!", reg_subtitle: "Please complete registration", reg_name: "Full Name", reg_country: "Country", reg_phone: "Phone Number", reg_email: "Email", reg_prof: "Profession", reg_langs: "Languages", reg_bio: "Bio / CV", reg_save: "Save Profile", edit_title: "My Profile & CV", edit_subtitle: "Update your information" },
                ru: { menu: "Настройки", chat: "Чат", voice: "Голос", meet: "Встреча", cv: "Резюме", social: "Соцсети", profile: "Мой Профиль", wallet: "Кошелек", theme: "Тема", export: "Экспорт", import: "Импорт", logout: "Выход", lang: "Язык: RU", reg_title: "Добро пожаловать в Hello Friends!", reg_subtitle: "Пожалуйста, пройдите регистрацию", reg_name: "Полное Имя", reg_country: "Страна", reg_phone: "Номер Телефона", reg_email: "Email", reg_prof: "Профессия", reg_langs: "Языки", reg_bio: "О себе / CV", reg_save: "Сохранить", edit_title: "Мой Профиль и CV", edit_subtitle: "Обновите свои данные" },
                az: { menu: "Tənzimləmələr", chat: "Çat", voice: "Səs", meet: "Görüş", cv: "CV", social: "Sosial", profile: "Profilim", wallet: "Pulqabı", theme: "Mövzu", export: "İxrac et", import: "İdxal et", logout: "Çıxış", lang: "Dil: AZ", reg_title: "Hello Friends-ə Xoş Gəldiniz!", reg_subtitle: "Zəhmət olmasa qeydiyyatdan keçin", reg_name: "Ad və Soyad", reg_country: "Ölkə", reg_phone: "Telefon Nömrəsi", reg_email: "E-poçt", reg_prof: "İxtisas", reg_langs: "Dillər", reg_bio: "Haqqında / CV", reg_save: "Yadda Saxla", edit_title: "Profilim və CV", edit_subtitle: "Məlumatları yenilə" },
                it: { menu: "Impostazioni", chat: "Chat", voice: "Voce", meet: "Incontra", cv: "CV", social: "Social", profile: "Mio Profilo", wallet: "Portafoglio", theme: "Tema", export: "Esporta", import: "Importa", logout: "Esci", lang: "Lingua: IT", reg_title: "Benvenuto in Hello Friends!", reg_subtitle: "Completa la registrazione", reg_name: "Nome Completo", reg_country: "Paese", reg_phone: "Telefono", reg_email: "Email", reg_prof: "Professione", reg_langs: "Lingue", reg_bio: "Bio / CV", reg_save: "Salva", edit_title: "Mio Profilo e CV", edit_subtitle: "Aggiorna i tuoi dati" }
            };

            let sysLang = navigator.language.slice(0, 2);
            let defLang = ['en', 'ru', 'az', 'it'].includes(sysLang) ? sysLang : 'en';
            window.appLang = localStorage.getItem('hf_app_lang') || defLang;

            window.changeAppLanguage = function(langCode) {
                window.appLang = langCode;
                localStorage.setItem('hf_app_lang', window.appLang);
                window.applyTranslations();
                window.closeDropdown();
            };

            window.applyTranslations = function() {
                const dict = i18n[window.appLang] || i18n['en'];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if(dict[key]) el.innerText = dict[key];
                });
                const langSelect = document.getElementById('app-lang-select');
                if(langSelect) langSelect.value = window.appLang;
            };
            window.applyTranslations();

            window.switchTab = function(index) {
                try {
                    const navLinks = Array.from(document.querySelectorAll('.nav-item')); 
                    const pages = document.querySelectorAll('.page-content');
                    pages.forEach(p => p.classList.remove('active'));
                    navLinks.forEach(l => l.classList.remove('active')); 
                    
                    const screens = ['message', 'voice-translator', 'conference', 'profession', 'social', 'archive'];
                    const targetId = screens[index]; 
                    document.getElementById(targetId)?.classList.add('active');
                    
                    if (index < navLinks.length && navLinks[index]) { navLinks[index].classList.add('active'); }
                    window.currentIndex = index;
                } catch(e) {}
            }

            // === FIREBASE И БАЗА ===
            const firebaseConfig = { apiKey: "AIzaSyBtIJPFKNNUn1XW5b44tdomXTPHNI2Px40", authDomain: "hello-friends-p8p3i7.firebaseapp.com", databaseURL: "https://hello-friends-p8p3i7-default-rtdb.europe-west1.firebasedatabase.app", projectId: "hello-friends-p8p3i7" };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            let activeUserId = localStorage.getItem('hf_active_user'); window.isGuest = !activeUserId;
            window.currentRoomId = "global"; window.activeChatListener = null; window.mySessionId = Math.random().toString(36).substring(2, 15);

            const countryData = {
                "un": { phone: "+", pop: "Global", seas: "World Oceans", desc: "International user connecting globally." },
                "az": { phone: "+994", pop: "10.1M", seas: "Caspian Sea", desc: "Azerbaijan — The Land of Fire." },
                "ru": { phone: "+7", pop: "144M", seas: "Arctic, Black Sea", desc: "The largest country in the world." },
                "gb": { phone: "+44", pop: "67M", seas: "North Sea, Atlantic", desc: "An island nation with deep historical influence." },
                "us": { phone: "+1", pop: "331M", seas: "Atlantic, Pacific", desc: "A massive country with diverse geography." },
                "de": { phone: "+49", pop: "84M", seas: "Baltic Sea, North Sea", desc: "The economic powerhouse of Europe." },
                "it": { phone: "+39", pop: "59M", seas: "Mediterranean", desc: "Famous for its rich history and art." },
                "ae": { phone: "+971", pop: "9.9M", seas: "Persian Gulf", desc: "Known for ultra-modern architecture and luxury." }
            };

            // БАЗОВЫЕ VIP ГЕРОИ (Они никогда не сотрутся)
            window.allCharacters = [
                { id: 'ilgar', name: 'Ilgar', photo: 'https://images.unsplash.com/photo-1557862921-37829c790f19?w=200', profession: 'Founder', email: 'ilgar@hellofriends.com', phone: '+994 50 123 45 67', flag: '🇦🇿', flagCode: 'az', langCode: 'az', country: 'Azerbaijan', pop: '10.1M', seas: 'Caspian Sea', desc: 'Creator of Hello Friends.', languages: 'AZ, RU, EN', video: 'https://assets.mixkit.co/videos/preview/mixkit-businessman-having-a-video-call-with-his-team-41209-large.mp4' },
                { id: 'klaus', name: 'Klaus Müller', photo: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200', profession: 'Senior Engineer', email: 'klaus@hellofriends.de', phone: '+49 176 1234 567', flag: '🇩🇪', flagCode: 'de', langCode: 'de', country: 'Germany', pop: '84M', seas: 'Baltic Sea', desc: 'Developing the core engine.', languages: 'DE, EN', video: 'https://assets.mixkit.co/videos/preview/mixkit-man-having-a-video-call-on-his-laptop-41221-large.mp4' },
                { id: 'marinella', name: 'Marinella', photo: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200', profession: 'Marketing', email: 'mary@hf.it', phone: '+39 333 123 4567', flag: '🇮🇹', flagCode: 'it', langCode: 'it', country: 'Italy', pop: '59M', seas: 'Mediterranean', desc: 'Leading global marketing.', languages: 'IT, EN', video: 'https://assets.mixkit.co/videos/preview/mixkit-woman-having-a-video-call-with-colleagues-41207-large.mp4' }
            ];
            const aiBot = { id: 'ai', name: 'AI Assistant', photo: 'https://ui-avatars.com/api/?name=AI&background=6b21a8&color=fff', profession: 'AI Core', email: 'ai@hf.com', phone: 'API', flag: '🤖', flagCode: 'un', langCode: 'en', country: 'Cloud', pop: 'Infinite', seas: 'Data', desc: 'Powered by Gemini.', languages: 'All', video: '' };

            // ЗАГРУЗКА ЛОКАЛЬНОГО ПРОФИЛЯ
            let myChar = null;
            if (window.isGuest) {
                window.myUsername = "Guest"; 
                myChar = { id: 'guest_' + Math.random().toString(36).substr(2,5), name: 'Guest', photo: 'https://ui-avatars.com/api/?name=Guest&background=00a884&color=fff', profession: 'New User', email: '', phone: '', flag: '🌐', flagCode: 'un', langCode: 'en', country: 'Global', pop: 'Unknown', seas: 'Digital', desc: 'New user in the app.', languages: 'Auto' };
            } else {
                let saved = localStorage.getItem('hf_custom_' + activeUserId);
                if(saved) {
                    myChar = JSON.parse(saved);
                } else {
                    myChar = window.allCharacters.find(c => c.id === activeUserId) || window.allCharacters[0]; 
                }
                window.myUsername = myChar.name.split(' ')[0];
            }
            window.myProfileInfo = { ...myChar, id: myChar.id, name: myChar.name.split(' ')[0] + ' (You)' };
            
            window.participants = [aiBot, ...window.allCharacters];

            // === 1. SMART MERGE (Умное склеивание контактов из Firebase) ===
            db.ref('users').on('value', (snapshot) => {
                const data = snapshot.val();
                let mergedUsers = [...window.allCharacters]; // Берем за основу VIP базу
                
                if (data) {
                    Object.values(data).forEach(u => {
                        let existingIdx = mergedUsers.findIndex(vip => vip.id === u.id);
                        if (existingIdx === -1) {
                            mergedUsers.push(u); // Добавляем новичков
                        } else {
                            mergedUsers[existingIdx] = { ...mergedUsers[existingIdx], ...u }; // Обновляем инфу VIP, если они изменили профиль
                        }
                    });
                }
                
                // Фильтруем себя и гостевые аккаунты из списка контактов
                window.participants = [aiBot, ...mergedUsers.filter(c => c.id !== window.myProfileInfo.id && !c.id.startsWith('guest'))];
                
                if(window.renderSidebar) window.renderSidebar();
                if(document.getElementById('profession') && document.getElementById('profession').classList.contains('active')) {
                    if(window.renderProfessionList) window.renderProfessionList();
                }
            });

            // === 2. БРОНЕБОЙНАЯ ПОДСКАЗКА ===
            window.showToast = function(name, info, photoUrl) {
                const toast = document.getElementById('toast-notification');
                if(!toast) return;
                
                document.getElementById('toast-name').innerText = name || 'User';
                document.getElementById('toast-info').innerText = info || '';
                
                const img = document.getElementById('toast-img');
                const icon = document.getElementById('toast-icon-wrap');
                
                if(photoUrl && photoUrl !== '') { 
                    img.src = photoUrl; img.style.display = 'block'; icon.style.display = 'none'; 
                } else { 
                    img.style.display = 'none'; icon.style.display = 'flex'; 
                }
                
                // Жесткое пробивание стилей Tailwind
                toast.style.transition = 'all 0.4s ease';
                toast.style.opacity = '1';
                toast.style.top = '20px';
                
                setTimeout(() => { 
                    toast.style.opacity = '0';
                    toast.style.top = '-100px';
                }, 4000);
            };

            window.renderSidebar = function() {
                const chatSidebar = document.getElementById('chat-sidebar');
                if (!chatSidebar) return;
                chatSidebar.innerHTML = `<div class="chat-contact ${window.currentRoomId === 'global' ? 'active-room' : ''}" id="chat-btn-global" onclick="window.switchChatRoom('global')"><div class="chat-contact-icon bg-[#005c4b] text-white flex justify-center items-center text-xl">🌍</div><span class="chat-contact-name text-white">Global</span></div>`;
                chatSidebar.innerHTML += `<div class="chat-contact ${window.currentRoomId === 'private_ai_bot' ? 'active-room' : ''}" id="chat-btn-ai" onclick="window.switchChatRoom('ai')"><div class="chat-contact-icon bg-purple-900 text-white flex justify-center items-center text-xl">🤖</div><span class="chat-contact-name text-[#a29bfe]">AI Bot</span></div>`;
                chatSidebar.innerHTML += `<div class="chat-contact ${window.currentRoomId === ('private_me_' + window.myProfileInfo.id) ? 'active-room' : ''}" id="chat-btn-me" onclick="window.switchChatRoom('me')"><div class="chat-contact-icon" style="background-image: url('${window.myProfileInfo.photo}');"><img src="https://flagcdn.com/w20/${window.myProfileInfo.flagCode}.png" class="absolute -bottom-1 -right-1 w-5 h-3.5 rounded-sm object-cover border border-[#111b21]"></div><span class="chat-contact-name text-white">You</span></div>`;
                
                window.participants.filter(p => p.id !== 'ai').forEach(p => {
                    // === 3. ЖЕЛЕЗНАЯ СОРТИРОВКА ПО УНИКАЛЬНОМУ ID ===
                    let sortedIds = [window.myProfileInfo.id, p.id].sort();
                    let expectedId = "private_" + sortedIds[0] + "_" + sortedIds[1];
                    chatSidebar.innerHTML += `<div class="chat-contact ${window.currentRoomId === expectedId ? 'active-room' : ''}" id="chat-btn-${p.id}" onclick="window.switchChatRoom('${p.id}')"><div class="chat-contact-icon" style="background-image: url('${p.photo}');"><img src="https://flagcdn.com/w20/${p.flagCode}.png" class="absolute -bottom-1 -right-1 w-5 h-3.5 rounded-sm object-cover border border-[#111b21]"></div><span class="chat-contact-name text-white">${p.name.split(' ')[0]}</span></div>`;
                });
            };

            window.switchChatRoom = function(targetId) {
                if (window.activeChatListener) { db.ref(window.currentRoomId).off("child_added", window.activeChatListener); }
                const chatMessages = document.getElementById('chat-messages'); if (chatMessages) chatMessages.innerHTML = ''; 
                
                if (targetId === 'global') {
                    window.currentRoomId = "global";
                    window.showToast("Global Chat", "International Public Room", "");
                }
                else if (targetId === 'ai') {
                    window.currentRoomId = "private_ai_bot";
                    window.showToast("AI Assistant", "Powered by Gemini", "https://ui-avatars.com/api/?name=AI&background=6b21a8&color=fff");
                }
                else if (targetId === 'me') {
                    window.currentRoomId = "private_me_" + window.myProfileInfo.id;
                    window.showToast("My Notes", "Saved messages", window.myProfileInfo.photo);
                }
                else {
                    const targetUser = window.participants.find(p => p.id === targetId);
                    if(targetUser) {
                        let sortedIds = [window.myProfileInfo.id, targetUser.id].sort();
                        window.currentRoomId = "private_" + sortedIds[0] + "_" + sortedIds[1]; 
                        
                        let cDesc = targetUser.countryDesc || countryData[targetUser.flagCode]?.desc || "User in network";
                        let uLangs = targetUser.languages || "Auto-Translate";
                        window.showToast(targetUser.flag + " " + targetUser.name.split(' ')[0], cDesc + " | Speaks: " + uLangs, targetUser.photo);
                    }
                }
                
                window.renderSidebar(); 
                window.activeChatListener = db.ref(window.currentRoomId).on("child_added", handleNewMessage);
            };

            window.sendFirebaseMsg = function() {
                const text = document.getElementById('chat-input').value.trim(); if(!text) return;
                
                // === 4. БОГАТЫЙ ПАКЕТ ДАННЫХ ПРИ ОТПРАВКЕ ===
                db.ref(window.currentRoomId).push({ 
                    userId: window.myProfileInfo.id,
                    name: window.myUsername, 
                    text: text, 
                    sessionId: window.mySessionId, 
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    photo: window.myProfileInfo.photo,
                    flag: window.myProfileInfo.flag,
                    flagCode: window.myProfileInfo.flagCode,
                    langCode: window.myProfileInfo.langCode // Языковой паспорт летит вместе с сообщением
                });
                document.getElementById('chat-input').value = '';
                if(window.currentRoomId === 'private_ai_bot') { setTimeout(() => { db.ref(window.currentRoomId).push({ name: "AI Assistant", text: "Translating global connections! 🚀", sessionId: "ai-bot-session", timestamp: firebase.database.ServerValue.TIMESTAMP, userId: 'ai', langCode: 'en' }); }, 1500); }
            }
            document.getElementById('chat-input')?.addEventListener('keypress', e => { if(e.key === 'Enter') window.sendFirebaseMsg(); });

            async function handleNewMessage(snapshot) {
                const data = snapshot.val(); if(!data) return; 
                const chatMessages = document.getElementById('chat-messages');
                
                // Идентификация по Уникальному ID, а не по имени
                const isMe = data.sessionId === window.mySessionId || data.userId === window.myProfileInfo.id; 
                const isAI = data.userId === "ai" || data.sessionId === "ai-bot-session";
                
                // Берем данные отправителя прямо из сообщения, если профиль еще не загрузился
                let p = isMe ? window.myProfileInfo : (isAI ? aiBot : (window.participants.find(part => part.id === data.userId) || { id: data.userId, photo: data.photo || 'https://ui-avatars.com/api/?name='+data.name, langCode: data.langCode || 'en', flag: data.flag || '🌐' }));
                
                const messageGroup = document.createElement('div');
                messageGroup.className = "flex flex-col w-full mt-3 mb-2";
                
                const msgWrapper = document.createElement('div'); 
                msgWrapper.className = `flex gap-2 w-full ${isMe ? 'justify-end' : 'justify-start'}`;
                let avatarHtml = isAI ? `<div class="w-8 h-8 rounded-full shrink-0 self-end flex items-center justify-center bg-purple-900 text-white text-xs cursor-pointer shadow-md" onclick="window.openAvatarModal('ai')">🤖</div>` : `<img src="${p.photo}" class="w-8 h-8 rounded-full shrink-0 self-end object-cover cursor-pointer border border-[#2a3942] shadow-md" onclick="window.openAvatarModal('${isMe ? 'me' : p.id}')">`;
                const bubbleHtml = `<div class="chat-bubble-wrapper ${isMe ? 'outgoing' : 'incoming'} flex flex-col"><div class="chat-sender-name">${!isMe ? (data.name || 'User') : ''}</div><div class="chat-bubble">${data.text}</div></div>`;
                msgWrapper.innerHTML = isMe ? bubbleHtml : avatarHtml + bubbleHtml; 
                
                messageGroup.appendChild(msgWrapper);
                if(chatMessages) { chatMessages.appendChild(messageGroup); chatMessages.scrollTop = chatMessages.scrollHeight; }

                let targetUsers = [];
                if (window.currentRoomId === 'global' && !isAI) { 
                    let allMembers = [window.myProfileInfo, ...window.participants.filter(part => part.id !== 'ai')];
                    allMembers.forEach(member => {
                        if (member.id !== data.userId && member.langCode !== 'un') {
                            targetUsers.push({ code: member.langCode, flag: member.flag, photo: member.photo });
                        }
                    });
                } else if (window.currentRoomId.startsWith('private_') && !isAI) {
                    if (isMe) {
                        let ids = window.currentRoomId.replace('private_', '').split('_');
                        let otherId = ids.find(id => id !== window.myProfileInfo.id);
                        let otherUser = window.participants.find(part => part.id === otherId);
                        if (otherUser && otherUser.langCode !== window.myProfileInfo.langCode) {
                            targetUsers.push({ code: otherUser.langCode, flag: otherUser.flag, photo: otherUser.photo });
                        }
                    } else {
                        // Если сообщение от Итальянца, переводим на МОЙ язык
                        if (data.langCode !== window.myProfileInfo.langCode) {
                            targetUsers.push({ code: window.myProfileInfo.langCode, flag: window.myProfileInfo.flag, photo: window.myProfileInfo.photo });
                        }
                    }
                }

                if (targetUsers.length > 0) {
                    try {
                        const fetchPromises = targetUsers.map(u => 
                            fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${u.code}&dt=t&q=${encodeURIComponent(data.text)}`)
                            .then(res => res.json())
                            .then(resData => ({ user: u, text: resData[0][0][0] }))
                            .catch(e => ({ user: u, text: `[${u.code.toUpperCase()}] ${data.text}` })) 
                        );
                        
                        const translationsRes = await Promise.all(fetchPromises); 
                        
                        const transContainer = document.createElement('div');
                        transContainer.className = `flex flex-col gap-2 mt-2 w-full ${isMe ? 'items-end pr-2' : 'items-start pl-10'}`;
                        
                        let marqueeTextStr = ''; 
                        translationsRes.forEach(t => { 
                            transContainer.innerHTML += `
                            <div class="flex items-end gap-2 opacity-95 max-w-[85%] ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="relative shrink-0">
                                    <img src="${t.user.photo}" class="w-6 h-6 rounded-full object-cover border border-[#00a884]">
                                    <span class="absolute -bottom-1 -right-1 text-[8px] bg-[#111b21] rounded-full px-[2px] leading-none">${t.user.flag}</span>
                                </div>
                                <div class="bg-[#202c33] border border-[#2a3942] rounded-2xl ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'} px-3 py-1.5 text-[0.8rem] text-yellow-400 font-bold shadow-sm">
                                    ${t.text}
                                </div>
                            </div>`; 
                            marqueeTextStr += `${t.user.flag} ${t.text}       `; 
                        }); 
                        
                        messageGroup.appendChild(transContainer);
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        
                        const mText = document.getElementById('chat-info-marquee');
                        if (window.isMarqueeEnabled !== false && mText) { 
                            mText.innerHTML = `<span class="text-white mr-2">${data.name || 'User'}:</span> <span class="text-[#00a884] font-bold">${marqueeTextStr}</span>`;

                    currentMicTarget = target; currentMicBtn = document.getElementById(btnId);
                    
                    let langSelect = document.getElementById('plus-mic-lang');
                    rec.lang = langSelect ? langSelect.value : 'en-US'; // Читает язык ИЗ РОМБА
                    
                    try { rec.start(); } catch(e){}
                }
            }

            window.switchChatRoom('global');
            if (window.isGuest) { 
                setTimeout(() => { window.openMyProfile(); }, 800); 
            } else {
                setTimeout(() => { if(window.autoSetMicLang) window.autoSetMicLang(); }, 500);
            }
            window.toggleTheme = function() { const s = document.getElementById('phone-body'); s.classList.toggle('light-theme'); window.closeDropdown(); };
        });
    </script>
