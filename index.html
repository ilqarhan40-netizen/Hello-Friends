<script>
        window.signOutGoogle = function() {
            firebase.auth().signOut().then(() => {
                localStorage.clear();
                document.cookie = "hf_active_user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                location.reload();
            });
        };

        window.closeAllMenus = function() { 
            document.getElementById('header-dropdown')?.classList.remove('active'); 
            document.getElementById('rhombus-actions')?.classList.remove('active'); 
            document.getElementById('rhombus-btn')?.classList.remove('active'); 
            const micPopup = document.getElementById('universal-mic-popup');
            if (micPopup) micPopup.classList.remove('active');
            if(window.closeEmojiPicker) window.closeEmojiPicker();
        };

        window.closeDropdown = window.closeAllMenus;
        window.toggleHeaderMenu = function(e) { e.stopPropagation(); document.getElementById('header-dropdown')?.classList.toggle('active'); };
        document.body.addEventListener('click', () => { window.closeAllMenus(); });

        window.currentMicInputTarget = 'chat-input';
        window.toggleUniversalMic = function(e, inputId) {
            e.stopPropagation();
            window.currentMicInputTarget = inputId;
            const popup = document.getElementById('universal-mic-popup');
            popup.classList.toggle('active');
        };

        window.handleSmartCall = function() {
            if (window.currentRoomId === 'global' || window.currentRoomId.startsWith('private_me') || window.currentRoomId === 'private_ai_bot') {
                alert("Please select a user from the Contacts list to make a call.");
            } else {
                window.startInAppCall();
            }
        };

        window.getSmartLang = function(userProfile) {
            if (!userProfile) return 'en'; 
            let phone = userProfile.phone || "";
            let flag = userProfile.flagCode || "un";
            if (phone.startsWith('+7')) return 'ru';
            if (phone.startsWith('+994')) return 'az';
            if (phone.startsWith('+39')) return 'it';
            if (phone.startsWith('+49')) return 'de';
            if (phone.startsWith('+33')) return 'fr';
            if (phone.startsWith('+81')) return 'ja';
            if (phone.startsWith('+34')) return 'es';
            if (phone.startsWith('+86')) return 'zh';
            if (phone.startsWith('+351')) return 'pt';
            if (phone.startsWith('+1') || phone.startsWith('+44')) return 'en';
            if (phone.startsWith('+971')) return 'ar';
            const flagToLang = { 'ru': 'ru', 'az': 'az', 'it': 'it', 'de': 'de', 'fr': 'fr', 'jp': 'ja', 'es': 'es', 'cn': 'zh', 'pt': 'pt', 'gb': 'en', 'us': 'en', 'ae': 'ar' };
            if (flagToLang[flag]) return flagToLang[flag];
            return userProfile.langCode || 'en';
        };

        window.startUniversalMic = async function(mode) {
            window.speechRecognizedText = "";
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            let rec = SpeechRec ? new SpeechRec() : null;
            if (!rec) return alert("Browser does not support Speech Recognition.");
            
            rec.continuous = false; rec.interimResults = false;
            let langSelect = document.getElementById('plus-mic-lang');
            let selectedMicLang = langSelect ? langSelect.value : 'auto';

            if (selectedMicLang === 'auto') {
                let smartCode = window.currentTargetUser ? window.getSmartLang(window.currentTargetUser) : window.getSmartLang(window.myProfileInfo);
                const voiceMap = { 'en': 'en-US', 'ru': 'ru-RU', 'az': 'az-AZ', 'it': 'it-IT', 'es': 'es-ES', 'fr': 'fr-FR', 'pt': 'pt-PT', 'ja': 'ja-JP', 'zh': 'zh-CN', 'ar': 'ar-AE' };
                rec.lang = voiceMap[smartCode] || 'en-US';
            } else { rec.lang = selectedMicLang; }
            
            window.showToast("Listening...", "Speak into the microphone", "", "");
            
            rec.onresult = async (e) => { 
                window.speechRecognizedText = e.results[0][0].transcript; 
                window.showToast("Processing...", "Preparing your voice message...", "", "");
                let textToShip = window.speechRecognizedText;
                let isVoice = window.currentMicInputTarget === 'voice-chat-input';
                let isConf = window.currentMicInputTarget === 'conf-chat-input';

                if (mode === 'text') {
                    db.ref(window.currentRoomId).push({ userId: window.myProfileInfo.id, name: window.myUsername, text: textToShip, originalText: window.speechRecognizedText, sessionId: window.mySessionId, timestamp: firebase.database.ServerValue.TIMESTAMP, photo: window.myProfileInfo.photo, flag: window.myProfileInfo.flag, flagCode: window.myProfileInfo.flagCode, langCode: window.myProfileInfo.langCode, isVoiceRoomMsg: isVoice, isConfMsg: isConf });
                } else if (mode === 'ai-audio') {
                    db.ref(window.currentRoomId).push({ userId: window.myProfileInfo.id, name: window.myUsername, text: textToShip, isAIAudio: true, originalText: window.speechRecognizedText, sessionId: window.mySessionId, timestamp: firebase.database.ServerValue.TIMESTAMP, photo: window.myProfileInfo.photo, flag: window.myProfileInfo.flag, flagCode: window.myProfileInfo.flagCode, langCode: window.myProfileInfo.langCode, isVoiceRoomMsg: isVoice, isConfMsg: isConf });
                }
            };
            try { rec.start(); } catch(e){}
        };

        window.playAIVoice = function(text, langCode) {
            if (!window.speechSynthesis) return alert("Your browser does not support AI Voice.");
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            const voiceMap = { 'en': 'en-US', 'ru': 'ru-RU', 'az': 'tr-TR', 'it': 'it-IT', 'es': 'es-ES', 'fr': 'fr-FR', 'pt': 'pt-PT', 'ja': 'ja-JP', 'zh': 'zh-CN' };
            utterance.lang = voiceMap[langCode] || langCode; 
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        };

        window.currentEmojiTargetId = null;
        window.toggleEmojiPicker = function(targetId) {
            window.currentEmojiTargetId = targetId;
            const picker = document.getElementById('emoji-picker');
            if (picker.classList.contains('opacity-0')) {
                picker.classList.remove('opacity-0', 'scale-95', 'pointer-events-none'); picker.classList.add('opacity-100', 'scale-100');
            } else { window.closeEmojiPicker(); }
        };
        window.closeEmojiPicker = function() {
            const picker = document.getElementById('emoji-picker');
            picker.classList.add('opacity-0', 'scale-95', 'pointer-events-none'); picker.classList.remove('opacity-100', 'scale-100');
        };
        window.insertEmoji = function(emoji) {
            if(window.currentEmojiTargetId) {
                const input = document.getElementById(window.currentEmojiTargetId);
                if(input) { input.value += emoji; input.focus(); }
            }
        };

        window.showToast = function(name, info, photoUrl, phoneStr) {
            const toast = document.getElementById('toast-notification'); if(!toast) return;
            document.getElementById('toast-name').innerText = name || 'User'; document.getElementById('toast-info').innerHTML = info || '';
            const phoneEl = document.getElementById('toast-phone'); const descBox = document.getElementById('toast-desc-box');
            if (phoneStr) { phoneEl.innerText = phoneStr; phoneEl.style.display = 'block'; } else { phoneEl.style.display = 'none'; }
            if (info) { descBox.style.display = 'block'; } else { descBox.style.display = 'none'; }
            const img = document.getElementById('toast-img'); const icon = document.getElementById('toast-icon-wrap');
            if(photoUrl && photoUrl !== '') { img.src = photoUrl; img.style.display = 'block'; icon.style.display = 'none'; } 
            else { img.style.display = 'none'; icon.style.display = 'flex'; }
            toast.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; 
            toast.style.opacity = '1'; toast.style.transform = 'translate(-50%, 0)'; toast.style.top = '15px';
            if(window.toastTimer) clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translate(-50%, -20px)'; toast.style.top = '-150px'; }, 6000); 
        };

        window.openAttachModal = function() { window.closeDropdown(); document.getElementById('attach-modal').classList.add('active'); };
        window.closeAttachModal = function() { document.getElementById('attach-modal').classList.remove('active'); };
        
        window.openNewsFast = function() { window.closeDropdown(); document.getElementById('search-modal').classList.add('active'); document.getElementById('search-suggestions').style.display = 'none'; document.getElementById('news-categories').style.display = 'flex'; setTimeout(() => { const c = window.myProfileInfo.country; let q = "World News"; if (c && c !== 'Global') q = "Latest news " + c; window.doNewsSearch(q); }, 300); };
        window.doNewsSearch = function(q) { document.getElementById('global-search-input').value = q; document.getElementById('search-results-area').innerHTML = ''; const iframe = document.getElementById('search-result-frame'); iframe.src = 'https://www.bing.com/search?q=' + encodeURIComponent(q); iframe.classList.remove('hidden'); };
        window.openSearchModal = function() { window.closeDropdown(); document.getElementById('search-modal').classList.add('active'); document.getElementById('global-search-input').value = ''; document.getElementById('search-results-area').innerHTML = ''; document.getElementById('search-suggestions').style.display = 'block'; const cat = document.getElementById('news-categories'); if(cat) cat.style.display = 'none'; const iframe = document.getElementById('search-result-frame'); iframe.src = 'about:blank'; iframe.classList.add('hidden'); setTimeout(() => document.getElementById('global-search-input').focus(), 100); };
        window.closeSearchModal = function() { document.getElementById('search-modal').classList.remove('active'); document.getElementById('global-search-input').value = ''; document.getElementById('search-results-area').innerHTML = ''; const iframe = document.getElementById('search-result-frame'); if (iframe) { iframe.src = 'about:blank'; iframe.classList.add('hidden'); } document.getElementById('search-suggestions').style.display = 'block'; const cat = document.getElementById('news-categories'); if(cat) cat.style.display = 'none'; };

        window.performLiveSearch = function() { 
            const query = document.getElementById('global-search-input').value.toLowerCase().trim(); 
            const resultsArea = document.getElementById('search-results-area'); 
            const suggestions = document.getElementById('search-suggestions'); 
            const categories = document.getElementById('news-categories');
            document.getElementById('search-result-frame').classList.add('hidden'); 
            if (query.length === 0) { resultsArea.innerHTML = ''; suggestions.style.display = 'block'; if(categories) categories.style.display = 'none'; return; } 
            suggestions.style.display = 'none'; if(categories) categories.style.display = 'none'; let html = ''; let found = false; 
            window.participants.forEach(p => { 
                if ((p.name||'').toLowerCase().includes(query) || (p.profession||'').toLowerCase().includes(query) || (p.country||'').toLowerCase().includes(query)) { 
                    found = true; html += `<div class="bg-[#202c33] border border-[#2a3942] rounded-2xl p-3 flex items-center justify-between cursor-pointer mb-2 shadow-sm" onclick="window.closeSearchModal(); window.switchTab(0); window.switchChatRoom('${p.id}');"><div class="flex items-center gap-3"><img src="${p.photo}" class="w-12 h-12 rounded-full object-cover border border-[#00a884]"><div class="flex flex-col"><span class="text-white font-bold">${(p.name||'User').split(' ')[0]} ${p.flag}</span><span class="text-[#8696a0] text-xs">${p.profession || 'User'}</span></div></div><i class="fa-solid fa-message text-[#00a884]"></i></div>`; 
                } 
            }); 
            resultsArea.innerHTML = found ? html : `<p class="text-sm text-[#8696a0] text-center mt-4">No internal results. Click Search Web.</p>`; 
        };

        window.handleSmartSearch = function(text, type = 'text') { const input = document.getElementById('global-search-input'); if (type === 'text') { input.value = text; window.performLiveSearch(); } else if (type === 'web') { input.value = text; document.getElementById('search-results-area').innerHTML = ''; window.doGoogleSearch(); } };
        window.doGoogleSearch = function() { const q = document.getElementById('global-search-input').value; if(q.trim() === '') return alert('Enter search query'); document.getElementById('search-suggestions').style.display = 'none'; document.getElementById('search-results-area').innerHTML = ''; const iframe = document.getElementById('search-result-frame'); iframe.src = 'https://www.bing.com/search?q=' + encodeURIComponent(q); iframe.classList.remove('hidden'); };

        window.switchWalletTab = function(tab) {
            const btnCard = document.getElementById('tab-btn-card'); const btnIntl = document.getElementById('tab-btn-intl');
            const frameCard = document.getElementById('frame-card'); const frameIntl = document.getElementById('frame-intl');
            if(tab === 'card') { btnCard.className = "flex-1 py-2 rounded-lg bg-[#111b21] text-white text-xs font-bold shadow-sm transition"; btnIntl.className = "flex-1 py-2 rounded-lg bg-transparent text-[#8696a0] text-xs font-bold hover:text-white transition"; frameCard.style.display = 'flex'; frameIntl.style.display = 'none'; } 
            else { btnIntl.className = "flex-1 py-2 rounded-lg bg-[#111b21] text-white text-xs font-bold shadow-sm transition"; btnCard.className = "flex-1 py-2 rounded-lg bg-transparent text-[#8696a0] text-xs font-bold hover:text-white transition"; frameIntl.style.display = 'flex'; frameCard.style.display = 'none'; }
        };

        window.updateTransferFeeUI = function(type) {
            let inputId = type === 'card' ? 'transfer-amount-card' : 'transfer-amount-intl'; let amtId = type === 'card' ? 'tf-amt-card' : 'tf-amt-intl';
            let totalId = type === 'card' ? 'tf-total-card' : 'tf-total-intl'; let btnId = type === 'card' ? 'tf-submit-card' : 'tf-submit-intl';
            let defaultBtnText = type === 'card' ? 'Send Money' : 'Send International'; let amt = parseFloat(document.getElementById(inputId).value) || 0; let total = amt > 0 ? amt + 0.01 : 0;
            document.getElementById(amtId).innerText = '$' + amt.toFixed(2); document.getElementById(totalId).innerText = '$' + total.toFixed(2); document.getElementById(btnId).innerText = amt > 0 ? `Send $${total.toFixed(2)}` : defaultBtnText;
        };

        window.openBankTransferModal = function() { 
            window.closeDropdown(); const recCard = document.getElementById('transfer-recipient-card'); const recIntl = document.getElementById('transfer-recipient-intl'); 
            let opts = '<option value="" disabled selected>Select Recipient</option>';
            window.participants.forEach(p => { if(p.id !== 'ai' && p.id !== window.myProfileInfo.id) { opts += `<option value="${p.id}">${(p.name||'User').split(' ')[0]} ${p.flag}</option>`; } }); 
            recCard.innerHTML = opts; recIntl.innerHTML = opts; document.getElementById('transfer-amount-card').value = ''; document.getElementById('transfer-amount-intl').value = ''; 
            window.updateTransferFeeUI('card'); window.updateTransferFeeUI('intl'); document.getElementById('transfer-modal').classList.add('active'); 
        };

        window.processMoneyTransfer = function(e, type) {
            e.preventDefault(); let amtInputId = type === 'card' ? 'transfer-amount-card' : 'transfer-amount-intl'; let recInputId = type === 'card' ? 'transfer-recipient-card' : 'transfer-recipient-intl';
            let amt = parseFloat(document.getElementById(amtInputId).value); let recId = document.getElementById(recInputId).value; if(!amt || amt <= 0 || !recId) return;
            let typeLabel = 'Card-to-Card'; if (type === 'intl') { typeLabel = document.getElementById('intl-provider').value; }
            let recUser = window.participants.find(p => p.id === recId); let recName = recUser ? (recUser.name || 'User').split(' ')[0] : 'Unknown'; let total = amt + 0.01;
            let id1 = String(window.myProfileInfo.id); let id2 = String(recId); let chatRoomId = (id1 < id2) ? ("private_" + id1 + "_" + id2) : ("private_" + id2 + "_" + id1);
            firebase.database().ref(chatRoomId).push({ userId: window.myProfileInfo.id, name: window.myUsername, isTransfer: true, transferTypeLabel: typeLabel, amount: amt.toFixed(2), total: total.toFixed(2), recName: recName, text: `💸 ${typeLabel}`, sessionId: window.mySessionId, timestamp: firebase.database.ServerValue.TIMESTAMP, photo: window.myProfileInfo.photo, flag: window.myProfileInfo.flag, flagCode: window.myProfileInfo.flagCode, langCode: window.myProfileInfo.langCode });
            window.closeBankTransferModal(); window.showToast("Transfer Sent", `Sent $${amt.toFixed(2)} to ${recName}. Network fee: $0.01`, "", "");
            document.getElementById(amtInputId).value = ''; window.updateTransferFeeUI(type); window.switchTab(0); window.switchChatRoom(recId);
        };

        window.openTrashModal = function() { window.closeDropdown(); document.getElementById('trash-modal').classList.add('active'); };
        window.smartArchive = function() { const archiveList = document.getElementById('archive-list'); const emptyMsg = document.getElementById('empty-archive'); if(emptyMsg) emptyMsg.style.display = 'none'; let chatName = window.currentTargetUser ? window.currentTargetUser.name.split(' ')[0] : "Global Room"; if (window.currentRoomId === 'private_ai_bot') chatName = "AI Assistant"; else if (window.currentRoomId.startsWith('private_me')) chatName = "My Notes"; let date = new Date().toLocaleDateString(); let archiveItem = document.createElement('div'); archiveItem.className = "bg-[#202c33] border border-[#2a3942] p-3 rounded-2xl flex justify-between items-center shadow-sm mb-2"; archiveItem.innerHTML = `<div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-[#111b21] flex items-center justify-center text-blue-400 border border-[#2a3942]"><i class="fa-solid fa-file-zipper"></i></div><div class="flex flex-col"><span class="text-white font-bold text-sm">Backup: ${chatName}</span><span class="text-[#8696a0] text-xs">${date} • Database</span></div></div><i class="fa-solid fa-cloud-arrow-down text-[#00a884] cursor-pointer hover:text-white transition" title="Download"></i>`; archiveList.prepend(archiveItem); window.showToast("Archived", "Saved to Cloud Repository", "", ""); window.closeTrashModal(); window.switchTab(5); };
        window.smartClear = function() { if(confirm("Are you sure you want to clear chat history?")) { const chatMsgs = document.getElementById('chat-messages'); if(chatMsgs) chatMsgs.innerHTML = ''; if(window.currentRoomId) { db.ref(window.currentRoomId).remove().catch(e => console.log("Cleared locally")); } window.closeTrashModal(); } };
        window.closeTrashModal = function() { document.getElementById('trash-modal').classList.remove('active'); };
        window.closeEmailModal = function() { document.getElementById('email-modal').classList.remove('active'); };
        window.closeLocationModal = function() { document.getElementById('location-modal').classList.remove('active'); };

        window.sendLocationToChat = function() { window.closeAttachModal(); if (navigator.geolocation) { navigator.geolocation.getCurrentPosition( (position) => { const lat = position.coords.latitude; const lon = position.coords.longitude; const embedLink = `https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`; const mapLink = `https://www.google.com/maps?q=${lat},${lon}`; db.ref(window.currentRoomId).push({ userId: window.myProfileInfo.id, name: window.myUsername, text: "📍 Shared Location", isLocation: true, lat: lat, lon: lon, embedLink: embedLink, mapLink: mapLink, sessionId: window.mySessionId, timestamp: firebase.database.ServerValue.TIMESTAMP, photo: window.myProfileInfo.photo, flag: window.myProfileInfo.flag, flagCode: window.myProfileInfo.flagCode, langCode: window.myProfileInfo.langCode }); }, (error) => { alert("Failed to get location. Please allow GPS access."); }, { timeout: 5000 } ); } else { alert("Geolocation is not supported by your browser."); } };
        window.openLocationModal = function() { window.closeDropdown(); document.getElementById('location-modal').classList.add('active'); const mapContainer = document.getElementById('location-map'); mapContainer.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-3xl text-[#00a884] mb-3"></i><span class="font-sans text-[#8696a0]">Detecting location...</span>'; if (navigator.geolocation) { navigator.geolocation.getCurrentPosition( (position) => { const lat = position.coords.latitude; const lon = position.coords.longitude; mapContainer.innerHTML = `<iframe width="100%" height="100%" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="https://maps.google.com/maps?q=${lat},${lon}&z=14&output=embed" style="border-radius: 12px;"></iframe>`; }, (error) => { mapContainer.innerHTML = '<span class="text-red-500 font-sans">Failed to get location. Please allow GPS access.</span>'; }, { timeout: 5000 } ); } else { mapContainer.innerHTML = '<span class="font-sans text-red-500">Geolocation is not supported by your browser.</span>'; } };

        window.toggleRhombusMenu = function(e) { e.stopPropagation(); const actions = document.getElementById('rhombus-actions'); const btn = document.getElementById('rhombus-btn'); if(actions.classList.contains('active')) { actions.classList.remove('active'); btn.classList.remove('active'); } else { actions.classList.add('active'); btn.classList.add('active'); } };
        window.inviteViaWhatsApp = function() { const text = "Hi! I am using the new secure Hello Friends network. Join me here: https://hellofriends.app"; window.location.href = `https://wa.me/?text=${encodeURIComponent(text)}`; };
        window.openPhoneChoiceModal = function() { window.closeDropdown(); document.getElementById('phone-choice-modal').classList.add('active'); };
        window.closePhoneChoiceModal = function() { document.getElementById('phone-choice-modal').classList.remove('active'); };

        window.startInAppCall = function() { if (!window.currentTargetUser) { alert("Please open a private chat with a contact first!"); window.closePhoneChoiceModal(); return; } const target = window.currentTargetUser; window.closePhoneChoiceModal(); db.ref('signals/' + target.id).push({ type: 'call', callerId: window.myProfileInfo.id, callerName: window.myUsername, callerPhoto: window.myProfileInfo.photo, timestamp: firebase.database.ServerValue.TIMESTAMP }); window.sendPushToUser(target.id, "Incoming Call 📞", `${window.myUsername} is calling you on Hello Friends!`); const photoEl = document.getElementById('voice-friend-photo'); const flagEl = document.getElementById('voice-friend-flag'); const nameEl = document.getElementById('voice-friend-name'); if(photoEl) photoEl.src = target.photo; if(flagEl) flagEl.innerText = target.flag; if(nameEl) nameEl.innerText = (target.name || 'User').split(' ')[0]; window.voiceFriend = target; window.switchTab(1); window.showToast("Calling...", `Ringing ${target.name}...`, target.photo, ""); };

        window.showIncomingCall = function(callerId, callerName, callerPhoto, signalKey) { window.currentIncomingSignalKey = signalKey; window.currentCallerId = callerId; document.getElementById('incoming-call-name').innerText = callerName; document.getElementById('incoming-call-photo').src = callerPhoto; document.getElementById('incoming-call-modal').classList.add('active'); window.sndRing.play().catch(e=>{}); window.firePush("Incoming Call 📞", `${callerName} is calling you on Hello Friends!`, callerPhoto); };
        window.acceptCall = function() { window.sndRing.pause(); window.sndRing.currentTime = 0; document.getElementById('incoming-call-modal').classList.remove('active'); db.ref('signals/' + window.myProfileInfo.id + '/' + window.currentIncomingSignalKey).remove(); let target = window.participants.find(p => p.id === window.currentCallerId); if(target) { window.currentTargetUser = target; const photoEl = document.getElementById('voice-friend-photo'); const flagEl = document.getElementById('voice-friend-flag'); const nameEl = document.getElementById('voice-friend-name'); if(photoEl) photoEl.src = target.photo; if(flagEl) flagEl.innerText = target.flag; if(nameEl) nameEl.innerText = (target.name || 'User').split(' ')[0]; window.voiceFriend = target; window.switchTab(1); } };
        window.declineCall = function() { window.sndRing.pause(); window.sndRing.currentTime = 0; document.getElementById('incoming-call-modal').classList.remove('active'); db.ref('signals/' + window.myProfileInfo.id + '/' + window.currentIncomingSignalKey).remove(); };

        window.initSignalListener = function() { db.ref('signals/' + window.myProfileInfo.id).on('child_added', (snap) => { const sig = snap.val(); if (!sig) return; if (Date.now() - sig.timestamp < 30000) { if (sig.type === 'call') { window.showIncomingCall(sig.callerId, sig.callerName, sig.callerPhoto, snap.key); } } else { db.ref('signals/' + window.myProfileInfo.id + '/' + snap.key).remove(); } }); };

        window.startExternalCall = function() { window.closePhoneChoiceModal(); if (window.currentTargetUser && window.currentTargetUser.phone) { window.location.href = `tel:${window.currentTargetUser.phone.replace(/\s+/g, '')}`; return; } alert('Open a user profile or private chat to make a cellular call.'); };
        window.openEmailModal = function() { window.closeDropdown(); document.getElementById('email-modal').classList.add('active'); };
        window.openDirectEmail = function(email) { window.openEmailModal(); if(email) document.getElementById('email-to').value = email; };
        window.handleEmailAttachment = function(event) { const file = event.target.files[0]; if (!file) return; const textEl = document.getElementById('email-text'); textEl.value += `\n[Uploading ${file.name}...]`; const reader = new FileReader(); reader.onload = function(e) { const base64Data = e.target.result; const newRef = db.ref('email_attachments').push(); newRef.set({ name: file.name, data: base64Data, timestamp: firebase.database.ServerValue.TIMESTAMP }).then(() => { textEl.value = textEl.value.replace(`\n[Uploading ${file.name}...]`, `\n📎 Attachment Link: https://secure-cloud.hf/file/${newRef.key}`); window.showToast("Attached!", "File securely uploaded to cloud.", "", ""); }); }; reader.readAsDataURL(file); };

            window.renderProfessionList = function() {

            window.initConference = function() {
